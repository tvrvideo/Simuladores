  var GLASS_CATALOG = buildGlassCatalog((tariff && tariff.glasses) || []);

  function buildGlassCatalog(glasses){
    var out = [];
    var blacklist = [
      "barrotillo","varilla","autocad","escanear","plantilla","plantillas",
      "facturación","facturacion","recogida","recogida de vidrio","reciclar",
      "canto pulido","canto","estria","bisel",
      "ángulo","angulo","lado curvo","circulo",
      "incorporación","incorporacion","limpiar","aprovechar","medir","presentar",
      "más de","mas de","%","recargo","superficie","m2","m²","lado de mayor"
    ];
    for(var i=0;i<glasses.length;i++){
      var g = glasses[i];
      var name = String((g && g.name) || "").trim();
      if(!name) continue;
      var low = name.toLowerCase();

      var skip = false;
      for(var k=0;k<blacklist.length;k++){
        if(low.indexOf(blacklist[k]) !== -1){ skip = true; break; }
      }
      if(skip) continue;

      // Añade grosor explícito si se puede inferir del nombre (mm / 44,1 / etc.)
      // (No cambia precio, solo mejora cálculo y visualización.)
      if(g && (g.mm === undefined || g.mm === null || g.mm === 0)){
        try{
          var mm = parseGlassThicknessMM(name);
          if(mm && isFinite(mm) && mm > 0) g.mm = mm;
        }catch(e){}
      }

      out.push(g);
    }
    // Orden alfabético
    out.sort(function(a,b){
      return String(a.name||"").localeCompare(String(b.name||""), "es");
    });
    return out;
  }

  function setMultiChecked(state, id, on){
    state.multi[id] = !!on;
  }

  function isExtraChecked(state, item){
    if(!item) return false;
    if(item.mode === "single") return state.single[item.category] === item.id;
    return !!state.multi[item.id];
  }

  function setExtraChecked(state, item, on){
    if(!item) return;
    if(item.mode === "single"){
      if(on) state.single[item.category] = item.id;
      else if(state.single[item.category] === item.id) delete state.single[item.category];
    } else {
      setMultiChecked(state, item.id, on);
    }
  }

  function getSelectedExtraItems(state){
    var items = ((tariff.extras||{}).items || []);
    return items.filter(function(it){ return isExtraChecked(state, it); });
  }

  function computeExtraBreakdown(m2_calc, m2_fac, ml){
    var items = getSelectedExtraItems(extrasSelected);
    var baseM2 = 0, baseML = 0, baseUD = 0, shapePct = 0;
    items.forEach(function(it){
      var price = Number(it.price||0);
      if(it.unit === "m2"){
        var factM2 = m2_fac;
        if(it.id === "gas_argon"){
          factM2 = Math.max(m2_calc, Number((tariff.extras||{}).min_m2_argon || 0.70));
        }
        baseM2 += factM2 * price;
      } else if(it.unit === "ml"){
        baseML += ml * price;
      } else if(it.unit === "ud"){
        baseUD += price;
      } else if(it.unit === "pct"){
        shapePct += price;
      }
    });
    return { items:items, m2:baseM2, ml:baseML, ud:baseUD, shapePct:shapePct };
  }

  function getSurfacePct(m2_calc){
    var rules = (((tariff.extras||{}).recargos_superficie)||[]).slice().sort(function(a,b){
      return Number(a.over||0)-Number(b.over||0);
    });
    var pct = 0;
    rules.forEach(function(r){
      if(m2_calc > Number(r.over||0)) pct = Number(r.pct||0);
    });
    return pct;
  }

  function getLongSidePct(anchoMM, altoMM){
    var maxLado = Math.max(Number(anchoMM||0), Number(altoMM||0));
    return maxLado > 3200 ? Number((tariff.extras||{}).recargo_lado_mayor_pct || 30) : 0;
  }

  // --- v4.0: grosor correcto (vidrios + cámaras) ---
  function parseGlassThicknessMM(name){
    var s = String(name||"").toLowerCase();

    // Caso directo "4mm", "6 mm", "8.8mm", etc.
    var m = s.match(/(\\d+(?:[.,]\\d+)?)\\s*mm/);
    if(m){
      var v = Number(String(m[1]).replace(",", "."));
      if(isFinite(v)) return v;
    }

    // Nomenclatura laminado tipo 44,1 / 33.2 / 55,2
    // Regla: XY.Z => X mm + Y mm + (0.38 * Z) interlayer
    // (Z=1 ->0.38, Z=2 ->0.76, etc.)
    var lam = s.match(/\\b(\\d)(\\d)\\s*[.,]\\s*(\\d)\\b/);
    if(lam){
      var g1 = Number(lam[1]), g2 = Number(lam[2]), z = Number(lam[3]);
      if(isFinite(g1) && isFinite(g2) && isFinite(z)){
        return (g1 + g2) + (0.38 * z);
      }
    }

    return 0;
  }

  function getGlassThicknessMM(g){
    if(!g) return 0;
    var direct = Number(g.mm);
    if(isFinite(direct) && direct > 0) return direct;
    return parseGlassThicknessMM(g.name);
  }

  function getCameraMM(c){
    if(!c) return 0;
    var v = Number(c.mm);
    return isFinite(v) ? v : 0;
  }

  function selectedThicknessMM(){
    // Suma: vidrio + cámara + vidrio (+ cámara + vidrio si triple)
    var t = 0;
    t += getGlassThicknessMM(selected.v1);
    t += getCameraMM(selected.c1);
    t += getGlassThicknessMM(selected.v2);
    if(selected.c2 && selected.v3){
      t += getCameraMM(selected.c2);
      t += getGlassThicknessMM(selected.v3);
    }
    // Redondeo a 2 decimales para laminados tipo 44,1 (8.38)
    return Math.round(t * 100) / 100;
  }

function sumEurM2(){
    var sum = 0;
    function add(x){ if(!x) return; var v = Number(x.eur_m2); if(isFinite(v)) sum += v; }
    add(selected.v1); add(selected.c1); add(selected.v2);
    if(selected.c2 && selected.v3){ add(selected.c2); add(selected.v3); }
    return sum;
  }

  function recalc(){
    var anchoIn = Number(elAncho && elAncho.value || 0);
    var altoIn  = Number(elAlto  && elAlto.value  || 0);

    var stepMM = Number(elMul6mm && elMul6mm.value || 60);
    var anchoMM = anchoIn;
    var altoMM  = altoIn;
    if(elMul6 && elMul6.checked) {
      anchoMM = ceilToMultiple(anchoIn, stepMM);
      altoMM  = ceilToMultiple(altoIn, stepMM);
    }

    if(anchoMM <= 0 || altoMM <= 0) {
      if(elM2Real) elM2Real.textContent = "0.00";
      if(elM2Fac)  elM2Fac.textContent  = "0.00";
      if(elEurM2)  elEurM2.textContent  = "0.00";
      if(elDockM2) elDockM2.textContent = "0.00";
      if(elDockML) elDockML.textContent = "0.00";
      if(elTotalPrecio) elTotalPrecio.textContent = "0,00";
      if(elCompTxt) elCompTxt.textContent = "—";
      if(elGrosorTxt) elGrosorTxt.textContent = "0";
      if(elDockM2Btn) elDockM2Btn.classList.remove("isMin");
      return;
    }

    var anchoM = anchoMM / 1000;
    var altoM  = altoMM  / 1000;

    var m2_real = (anchoIn/1000) * (altoIn/1000);
    var m2_calc = anchoM * altoM;

    var minFact = Number(tariff.min_m2);
    if(!isFinite(minFact)) minFact = 0.70;

    var m2_fac = Math.max(m2_calc, minFact);
    var ml = (anchoM*2) + (altoM*2);

    var usedMinFact = (m2_calc < minFact);
    if(elDockM2Btn) elDockM2Btn.classList.toggle("isMin", usedMinFact);

    if(elM2Real) elM2Real.textContent = m2_real.toFixed(2);
    if(elM2Fac)  elM2Fac.textContent  = m2_fac.toFixed(2);

    var parts = getParts();
    if(elCompTxt) elCompTxt.textContent = parts.join("/") || "—";

    var grosor = selectedThicknessMM();
    if(elGrosorTxt) elGrosorTxt.textContent = String(grosor);

    var eurM2 = sumEurM2();
    if(elEurM2) elEurM2.textContent = eurM2.toFixed(2);

    var baseTotal = m2_fac * eurM2;
    var extraInfo = computeExtraBreakdown(m2_calc, m2_fac, ml);
    var surfacePct = getSurfacePct(m2_calc);
    var longPct = getLongSidePct(anchoMM, altoMM);

    var total = baseTotal + extraInfo.m2 + extraInfo.ml + extraInfo.ud;
    var totalPct = surfacePct + longPct + extraInfo.shapePct;
    if(totalPct > 0) total = total * (1 + totalPct/100);

    var pvp = loadPVP();
    if(pvp && pvp.on){ total = total * 2; }

    var iva = loadIVA();
    if(iva && iva.on){ total = total * (1 + (Number(iva.rate)||21)/100); }

    renderExtrasSummary(m2_calc, m2_fac, ml, extraInfo, surfacePct, longPct);

    if(elDockM2) elDockM2.textContent = m2_fac.toFixed(2);
    if(elDockML) elDockML.textContent = ml.toFixed(2);
    if(elTotalPrecio) elTotalPrecio.textContent = money(total);
  }

  function buildTarifaPayload(){

    };

  function exportTarifa(){
    try {
      var payload = buildTarifaPayload();
      var txt = JSON.stringify(payload, null, 2);

      var d = new Date();
      var y = d.getFullYear();
      var mo = String(d.getMonth()+1).padStart(2,"0");
      var da = String(d.getDate()).padStart(2,"0");
      var filename = "RAMOS_Climalit_tarifa_" + y + "-" + mo + "-" + da + ".json";

      // iOS share si se puede
      try {
        if(window.File) {
          var file = new File([txt], filename, { type:"application/json" });
          if(navigator.share && navigator.canShare && navigator.canShare({ files:[file] })) {
            navigator.share({ files:[file], title:"Tarifa Climalit", text:"Tarifa Ramos Climalit" }).catch(function(){});
            return;
          }
        }
      } catch(e){}

      // fallback download
      var blob = new Blob([txt], {type:"application/json"});
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = filename;
      a.rel = "noopener";
      document.body.appendChild(a);
      a.click();
      setTimeout(function(){ URL.revokeObjectURL(url); a.remove(); }, 800);
    } catch(e) {
      try{ alert("No se pudo exportar."); }catch(_e){}
    }
  }

  function applyImportedTariff(newTariff){
    if(!newTariff || typeof newTariff !== "object") throw new Error("bad");
    if(!Array.isArray(newTariff.glasses) || !Array.isArray(newTariff.cameras)) throw new Error("bad");
    if(typeof newTariff.min_m2 !== "number") newTariff.min_m2 = 0.70;
    ensureCamerasBase(newTariff);
    ensureExtrasBase(newTariff);

    tariff = newTariff;
    saveTariff(tariff);

    // Reset selección a defaults con la nueva tarifa
    pickDefaults();
    refreshSlots();
    recalc();
  }

  function importTarifaFromFile(file){
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(){
      try {
        var obj = JSON.parse(String(reader.result || ""));
        var newTariff = (obj && obj.tariff) ? obj.tariff : obj;
        applyImportedTariff(newTariff);
        try{ alert("Tarifa importada."); }catch(_e){}
      } catch(e) {
        try{ alert("Tarifa no válida."); }catch(_e){}
      }
    };
    reader.readAsText(file);
  }

    if(obj.tariff) obj = obj.tariff;

      obj.vidrios = obj.vidrios.map(v=>({ id: v.id||uid("v"), group:String(v.group||""), name:String(v.name||""), eur_m2:+v.eur_m2||0, tipo:(v.tipo==="lam"?"lam":"mono"), cp:+v.cp||0, cpi:+v.cpi||0 }));

      obj.app = obj.app || "RAMOS_MONOLITICO";
      obj.version = obj.version || "3.0";
      obj.ts = obj.ts || new Date().toISOString();
      return obj;
    }
    if(Array.isArray(obj.items)){

  function isPerimeterCategory(name){

    return norm === "perimetro" || norm === "manufactura";
  }

  function pruneSelectedExtras(){
    const valid = new Set((tariff.extras||[]).map(e=>e.id));
    selectedExtraIds = new Set(Array.from(selectedExtraIds).filter(id=>valid.has(id)));

      const ok = (tariff.extras||[]).some(e=>e.id===selectedManufactura.id && isPerimeterCategory(e.category));

  function areaAndPerimeter(){
    const w = Math.max(0, parseFloat((elAncho && elAncho.value) || "0")) / 1000;
    const h = Math.max(0, parseFloat((elAlto && elAlto.value) || "0")) / 1000;
    const m2 = w*h;
    const ml = 2*(w+h);
    const sideMax = Math.max(w,h);
    return { w,h,m2,ml,sideMax };
  }

  function minAreaForTipo(tipo){
    return tipo==="lam" ? 0.50 : 0.25;
  }

  function formaRecargoPct(){
    const v = (elForma && elForma.value) || "recto";
    if(v==="angulo") return 15;
    if(v==="curvo") return 55;
    if(v==="circulo") return 115;
    return 0;
  }

  function superficieRecargoPct(m2){
    if(m2>10) return 85;
    if(m2>9) return 65;
    if(m2>8) return 55;
    if(m2>7) return 48;
    if(m2>6) return 40;
    if(m2>5) return 28;
    if(m2>4) return 18;
    return 0;
  }

  function xFinite(n){ return Number.isFinite(+n); }

  function calcular(){
    const {m2, ml, sideMax} = areaAndPerimeter();
    const vidrio = getSelectedVidrio();
    const tipo = vidrio ? vidrio.tipo : "mono";

    let m2fac = m2;
    let appliedMin = false;
    if(vidrio){
      const min = minAreaForTipo(tipo);
      if(m2fac < min){
        m2fac = min;
        appliedMin = true;
        if(!_minState.applied || _minState.min!==min || _minState.tipo!==tipo){
          _minState = { applied:true, min:min, tipo:tipo };
          showToast(\`Se aplica mínimo: \${min.toFixed(2)} m² (\${tipo==="lam"?"Laminar":"Monolítico"})\`);
        }
      }
    }

    if(!appliedMin && _minState.applied){ _minState = { applied:false, min:0, tipo:'' }; }

    const recargoLadoPct = sideMax > 3.20 ? 30 : 0;
    const pctForma = formaRecargoPct();
    const pctSup = superficieRecargoPct(m2); 
    const pctTotal = pctForma + pctSup + recargoLadoPct;

    let total = 0;
    if(vidrio){
      total += (+vidrio.eur_m2||0) * m2fac;
    }

    const checked = getCheckedExtras();
    checked.forEach(e=>{
      const p = +e.price||0;
      if(!p) return;
      if(e.unit==="ml") total += p*ml;
      else if(e.unit==="ud") total += p*1;
      else if(e.unit==="m2") total += p*m2fac;
      else if(e.unit==="pct") { 
        total *= (1 + (p/100));
      }
    });

    if(pctTotal>0){
      total *= (1 + (pctTotal/100));
    }

    const pvp = loadPVP();
    if(pvp && pvp.on){
      total = total * 2;
    }

    const totalBase = total;
    const iva = loadIVA();
    let ivaAmount = 0;
    if(iva && iva.on){
      ivaAmount = totalBase * ((Number(iva.rate)||21)/100);
      total = totalBase + ivaAmount;
    }

    currentCalc = {
      total,
      totalBase,
      pvpOn: !!(pvp && pvp.on),
      ivaOn: !!(iva && iva.on),
      ivaAmount,
      m2,
      m2fac,
      ml,
      pctTotal,
      recargoLadoPct,
      pctForma,
      pctSup,
      vidrio,
      extras: checked.slice()
    };

    qs("m2Real").textContent = m2.toFixed(2);
    qs("m2Fac").textContent = m2fac.toFixed(2);
    qs("mlPer").textContent = ml.toFixed(2);
    qs("dockM2").textContent = m2fac.toFixed(2);
    qs("dockML").textContent = ml.toFixed(2);
    qs("totalPrecio").textContent = moneyEUR(total);

    const badgeMin = qs("badgeMinimo");
    badgeMin.style.display = appliedMin ? "inline-block" : "none";
    const badgeRec = qs("badgeRecargo");
    badgeRec.style.display = (pctTotal>0) ? "inline-block" : "none";

    updateVidrioSummary();
  }

  function closeModal(overlay, sheet){
    if(!overlay || !sheet) return;
    overlay.classList.remove("open");
    sheet.classList.remove("open");
    overlay.setAttribute("aria-hidden","true");
    sheet.setAttribute("aria-hidden","true");
    const anyOpen = document.querySelector(".modalOverlay.open") || document.querySelector(".modalSheet.open");

  async function exportTariff(){
    const payload = JSON.stringify(tariff, null, 2);
    const filename = \`tarifa_ramos_\${new Date().toISOString().slice(0,10)}.json\`;
    const blob = new Blob([payload], { type:"application/json" });

    try{
      const file = new File([blob], filename, { type:"application/json" });
      if(navigator.share && navigator.canShare && navigator.canShare({ files:[file] })){
        await navigator.share({ files:[file], title:"Tarifa Ramos", text:"Tarifa JSON" });
        return;
      }
    }catch(_e){}

    try{
      if(navigator.clipboard && navigator.clipboard.writeText){
        await navigator.clipboard.writeText(payload);
        showToast("JSON copiado al portapapeles. Pégalo en Archivos o Notas y guárdalo como .json");
        return;
      }
    }catch(_e){}

    showToast("No se pudo compartir automáticamente. Copia la tarifa desde un navegador compatible.");
  }

  function importTariffFromFile(file){
    const reader = new FileReader();
    reader.onload = ()=>{
      try{
        const obj = JSON.parse(String(reader.result||"{}"));
        const norm = normalizeTariff(obj);
        if(!norm) throw new Error("Formato no válido");
        tariff = norm;
        saveTariff(tariff);
        applyTariffToUI();
        showToast("Tarifa importada y aplicada.");
      }catch(e){
        showToast("JSON inválido o formato no compatible.");
      }
    };
    reader.readAsText(file);
  }

<script>

(function(){

  var volviendo = false;

  function solicitarVolverIndex(){
    if(volviendo) return false;

    try{
      if(window.parent && window.parent !== window && typeof window.parent.volverMenu === "function"){
        window.parent.volverMenu();
        return false;
      }

    try{
      if(window.parent && window.parent !== window){
        window.parent.postMessage({type:"volverMenu", action:"volverMenu", target:"index"}, "*");
        window.parent.postMessage({type:"volver", action:"volverIndex", target:"index"}, "*");
        window.parent.postMessage("volverMenu", "*");
        window.parent.postMessage("volverIndex", "*");
      }
    }catch(e){}

    setTimeout(function(){
      try{
        if(window.top && window.top !== window){
          window.top.location.href = "index.html";
        }else{
          window.location.href = "index.html";
        }
      }catch(e){
        try{ window.location.href = "index.html"; }catch(_){}
      }
    }, 120);

    return false;
  }

  window.solicitarVolverIndex = solicitarVolverIndex;
  window.volverIndex = solicitarVolverIndex;

  var btn = document.querySelector(".btnMenuRojo");
  if(btn){
    btn.onclick = function(ev){
      try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}
      return solicitarVolverIndex();
    };
    btn.addEventListener("touchend", function(ev){
      try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}
      solicitarVolverIndex();
    }, {passive:false});
  }
})();
</script>
