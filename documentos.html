      if(data && typeof data === 'object'){
        if(data.numero) state.numero = String(data.numero);
        if(data.documentoTipo && ['presupuesto','factura','albaran'].includes(data.documentoTipo)) state.documentoTipo = data.documentoTipo;
        if(data.fecha) state.fecha = String(data.fecha);
        if(data.validez) state.validez = String(data.validez);
        syncFacturaVencimientoDefault();
        if(data.clienteNombre != null) state.clienteNombre = String(data.clienteNombre || '');
        if(data.clienteTelefono != null) state.clienteTelefono = String(data.clienteTelefono || '');
        if(data.clienteDireccion != null) state.clienteDireccion = String(data.clienteDireccion || '');
        if(data.clientePoblacion != null) state.clientePoblacion = String(data.clientePoblacion || '');
        if(data.clienteProvincia != null) state.clienteProvincia = String(data.clienteProvincia || '');
        if(data.clienteNif != null) state.clienteNif = String(data.clienteNif || '');
        if(data.facturacionId != null) state.facturacionId = String(data.facturacionId || '');

        // Cuenta bancaria: se conserva igual en factura con imágenes y sin imágenes.
        const bankInfo = getStoredBankInfo();
        state.accountLine2 = String(data.accountLine2 || state.accountLine2 || bankInfo.accountLine2 || '');
        state.accountLine3 = String(data.accountLine3 || state.accountLine3 || bankInfo.accountLine3 || '');
        if(state.accountLine2 || state.accountLine3) saveStoredBankInfo();

        if(String(data.source || '') === 'facturacion'){
          launchedFromFacturacion = true;
          if($('btnReturnApp')) { $('btnReturnApp').classList.remove('hidden'); $('btnReturnApp').classList.add('show'); }
          if($('btnFactReturnTop')) { $('btnFactReturnTop').classList.add('show'); }
        }
        await persistCurrent();
      }
    }catch(e){}
    try{ sessionStorage.removeItem(PRESUPUESTO_VISUAL_BRIDGE_KEY); }catch(e){}
    try{ localStorage.removeItem(PRESUPUESTO_VISUAL_BRIDGE_KEY); }catch(e){}
  }

  try{
    window.importarEmpresaDesdeFacturacion = importarEmpresaDesdeFacturacion;
  }catch(_){}

  (async function init(){
    state = await loadState();
    await importarEmpresaDesdeFacturacionSiVacia(); // v2.85.71 empresa facturación manda    if(!state.accountLine2 && !state.accountLine3){ const bankInfo = getStoredBankInfo(); state.accountLine2 = String(bankInfo.accountLine2 || ''); state.accountLine3 = String(bankInfo.accountLine3 || ''); } if(state.accountLine2 || state.accountLine3) saveStoredBankInfo(); // v2.85.71 bank init

    await applyFacturacionBridge();
    await importarEmpresaDesdeFacturacionSiVacia(); // v2.85.71 tras bridge
    await applyReturnedDesignImage();
    await tryLoadDefaultLogo();
    await loadConceptTemplates();
    await loadClients();
    await loadProducts();
    setViewportVars();
    applyZoom();
    installPinchZoom();
    installViewportLock();
    window.addEventListener('resize', function(){ setViewportVars(); applyZoom(); }, { passive:true });
    if(window.visualViewport){
      window.visualViewport.addEventListener('resize', function(){ setViewportVars(); applyZoom(); }, { passive:true });
      window.visualViewport.addEventListener('scroll', setViewportVars, { passive:true });
    }
    render();
    updateDocumentStatusBadge();
    handleStartFromFacturacion();
  })();
})();

<script>
(function(){
  function solicitarVolverIndex(){
    try{
      if(window.parent && window.parent !== window && typeof window.parent.volverMenu === 'function'){
        window.parent.volverMenu();
        return false;
      }
    }catch(e){}
    try{
      window.location.href = 'index.html';
    }catch(e){}
    return false;
  }

  window.solicitarVolverIndex = solicitarVolverIndex;

  var btn = document.getElementById('btnVolverIndex');
  if(btn){
    btn.onclick = function(ev){
      try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}
      return solicitarVolverIndex();
    };
    btn.addEventListener('touchend', function(ev){
      try{ ev.preventDefault(); ev.stopPropagation(); }catch(e){}
      solicitarVolverIndex();
    }, {passive:false});
  }
})();
</script>
