<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Documentos Rey v2.86.01</title>
  <style>
    :root{
      --app-vh:100vh;
      --vv-bottom:0px;
      --bg:#eef2f7;
      --card:#ffffff;
      --line:#cfd8e3;
      --text:#0f172a;
      --muted:#64748b;
      --primary:#2563eb;
      --success:#16a34a;
      --danger:#dc2626;
      --violet:#7c3aed;
      --shadow:0 12px 28px rgba(15,23,42,.08);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{touch-action:manipulation;overscroll-behavior:none}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;-webkit-text-size-adjust:100%;text-size-adjust:100%}
    body{min-height:100vh;min-height:var(--app-vh)}
    button,input,textarea{font:inherit}
    .app{min-height:100vh;min-height:var(--app-vh);padding:4px 6px calc(72px + env(safe-area-inset-bottom) + var(--vv-bottom))}
    .shell{max-width:1180px;margin:0 auto}
    .topbar{
      touch-action:manipulation;

      position:relative;z-index:5;
      background:transparent;
      padding:calc(2px + env(safe-area-inset-top)) 0 2px;
      margin-bottom:2px;
    }
    .topbar-row{display:flex;align-items:center;justify-content:flex-start;gap:8px;min-height:28px}
    .brand{display:flex;align-items:baseline;gap:8px;min-width:0;flex:1 1 auto;overflow:hidden}
    .title{margin:0;font-size:15px;font-weight:900;letter-spacing:-0.03em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .version-inline{font-size:10px;color:var(--muted);font-weight:800;white-space:nowrap;flex:0 0 auto}
    .btn-icon{
      border:1px solid var(--line);background:#fff;color:var(--text);
      border-radius:12px;min-width:40px;height:40px;padding:0;cursor:pointer;
      display:inline-flex;align-items:center;justify-content:center;
      box-shadow:0 4px 10px rgba(15,23,42,.04);flex:0 0 auto;font-size:20px;
    }
    .stage-wrap{display:grid;grid-template-columns:1fr;gap:0}
    .panel{background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow)}
    .canvas-wrap{padding:4px 4px 16px;overflow:auto;-webkit-overflow-scrolling:touch;touch-action:pan-x pan-y pinch-zoom}
    .page-shell{width:min(100%,980px);margin:0 auto;transform-origin:top center}
    svg{display:block;width:100%;height:auto;background:#fff;border-radius:18px}
    .hidden{display:none !important}
    .floating-actions{
      touch-action:manipulation;

      position:fixed;left:6px;right:6px;bottom:calc(6px + env(safe-area-inset-bottom) + var(--vv-bottom));
      transform:none;margin:0 auto;
      z-index:30;display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:4px;
      width:min(860px, calc(100vw - 12px));padding:4px;
      background:rgba(255,255,255,.96);backdrop-filter:blur(12px);
      border:1px solid var(--line);border-radius:16px;box-shadow:0 14px 26px rgba(15,23,42,.14);
    }
    .fab{
      border:1px solid transparent;border-radius:12px;padding:7px 4px;
      cursor:pointer;min-height:34px;font-size:11px;font-weight:900;
      display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.05;
      letter-spacing:-0.01em;
    }
    .fab-new{background:#fff;color:var(--text);border-color:var(--line)}
    .fab-save{background:var(--success);color:#fff}
    .fab-pdf{background:var(--primary);color:#fff}
    .fab-png{background:var(--violet);color:#fff}
    .fab-settings{background:#fff;color:var(--text);border-color:var(--line)}
    .btn,.btn-secondary{
      border:1px solid var(--line);background:#fff;color:var(--text);border-radius:14px;
      min-height:42px;padding:0 14px;font-weight:800;cursor:pointer;
    }
    .sheet{
      touch-action:manipulation;

      position:fixed;left:0;right:0;bottom:0;z-index:60;
      background:#fff;border-radius:24px 24px 0 0;border:1px solid var(--line);
      box-shadow:0 -16px 40px rgba(15,23,42,.18);
      padding:16px 16px calc(16px + env(safe-area-inset-bottom) + var(--vv-bottom));
      transform:translateY(110%);transition:transform .22s ease;
      max-height:min(calc(var(--app-vh) - 10px),920px);overflow:auto;
      overscroll-behavior:contain;
    }
    .sheet.show{transform:translateY(0)}
    .sheet-head{position:sticky;top:-16px;z-index:3;display:flex;align-items:center;justify-content:space-between;gap:10px;margin:0 -16px 10px;padding:16px 16px 10px;background:#fff;border-radius:24px 24px 0 0}
    .sheet-title{font-size:18px;font-weight:900;margin:0}
    .sheet-subtitle{display:none}
    .sheet label{display:block;font-size:12px;font-weight:900;margin:10px 0 6px}
    .sheet input,.sheet textarea{width:100%;border:1px solid var(--line);border-radius:14px;padding:13px 14px;background:#fff;color:var(--text)}
    .sheet textarea{min-height:120px;resize:vertical}
    .sheet{scroll-padding-bottom:220px}
    .sheet input:focus,.sheet textarea:focus{scroll-margin-bottom:220px;scroll-margin-top:90px}
    .sheet-actions{position:sticky;bottom:calc(-16px - var(--vv-bottom));z-index:2;display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;margin-left:-16px;margin-right:-16px;padding:12px 16px calc(12px + env(safe-area-inset-bottom) + var(--vv-bottom));background:linear-gradient(to top,#fff 72%,rgba(255,255,255,.94) 100%)}
    .settings-list{display:grid;gap:10px}
    .settings-item{
      width:100%;text-align:left;border:1px solid var(--line);background:#fff;border-radius:16px;
      padding:14px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px;
      font-weight:800;color:var(--text);cursor:pointer;
      box-shadow:0 8px 18px rgba(15,23,42,.08);
    }
    .settings-item small{display:block;color:rgba(255,255,255,.92);font-size:12px;font-weight:700;margin-top:3px}
    .settings-item > span:last-child{font-size:22px;line-height:1;font-weight:900;opacity:.95}
    .settings-item.settings-open{background:linear-gradient(135deg,#0f766e,#14b8a6);border-color:#0f766e;color:#fff}
    .settings-item.settings-import{background:linear-gradient(135deg,#2563eb,#60a5fa);border-color:#2563eb;color:#fff}
    .settings-item.settings-export{background:linear-gradient(135deg,#7c3aed,#a78bfa);border-color:#7c3aed;color:#fff}
    .settings-item.settings-logo{background:linear-gradient(135deg,#ea580c,#fb923c);border-color:#ea580c;color:#fff}
    .settings-item.settings-style{background:linear-gradient(135deg,#0f172a,#334155);border-color:#0f172a;color:#fff}
    .settings-danger{border-color:#b91c1c;background:linear-gradient(135deg,#dc2626,#f87171);color:#fff}
    .style-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .style-card{border:1px solid var(--line);border-radius:16px;padding:12px;background:#fff}
    .style-card h3{margin:0 0 8px;font-size:14px;font-weight:900}
    .style-row{display:flex;align-items:center;gap:10px;margin-top:10px}
    .style-row input[type="color"]{width:52px;height:40px;padding:4px;border-radius:12px;border:1px solid var(--line);background:#fff}
    .style-row input[type="number"]{flex:1 1 auto;min-width:0}
    .style-row span{font-size:12px;font-weight:800;min-width:0;flex:1 1 auto}
    .style-preview{border:1px solid var(--line);border-radius:14px;padding:10px;margin-top:12px;background:#fff}
    .style-preview-bar{height:18px;border-radius:8px;margin-bottom:8px}
    @media (max-width:760px){ .style-grid{grid-template-columns:1fr} }
    .backdrop{position:fixed;inset:0;background:rgba(15,23,42,.34);z-index:55;display:none}
    .backdrop.show{display:block}
    .toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:#0f172a;color:#fff;padding:10px 14px;border-radius:999px;z-index:80;font-weight:800;font-size:14px;opacity:0;pointer-events:none;transition:opacity .18s ease;max-width:calc(100vw - 40px);text-align:center}
    .toast.show{opacity:1}
    .return-app-btn{
      position:fixed;
      right:12px;
      bottom:80px;
      z-index:9999;
      border:1px solid #0f766e;
      background:linear-gradient(135deg,#0f766e,#14b8a6);
      color:#fff;
      border-radius:999px;
      padding:8px 12px;
      font-size:12px;
      font-weight:800;
      box-shadow:0 6px 14px rgba(15,118,110,.25);
      display:none;
      align-items:center;
      justify-content:center;
      width:auto;
      height:auto;
      line-height:1;
      touch-action:manipulation;
    }
    .return-app-btn.show{
      display:inline-flex !important;
      align-items:center;
      justify-content:center;
    }
    .fact-return-top{
      display:none !important;
    }
    .fact-return-top.show{display:inline-flex !important; align-items:center; justify-content:center;}

    @media (min-width:861px){ .return-app-btn{bottom:86px} }
    .png-screen{position:fixed;inset:0;z-index:10000;background:var(--bg);display:none;flex-direction:column;padding:10px calc(10px + env(safe-area-inset-right)) calc(10px + env(safe-area-inset-bottom)) calc(10px + env(safe-area-inset-left));}
    .png-screen.show{display:flex}
    .png-card{display:flex;flex-direction:column;gap:10px;min-height:100%;}
    .png-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 4px 0;}
    .png-title{margin:0;font-size:18px;font-weight:900}
    .png-preview-wrap{flex:1 1 auto;min-height:0;border:1px solid var(--line);background:#fff;border-radius:18px;padding:10px;overflow:auto;-webkit-overflow-scrolling:touch;display:flex;align-items:flex-start;justify-content:center;}
    .png-preview-wrap img{display:block;width:100%;max-width:900px;height:auto;background:#fff;border-radius:12px;box-shadow:0 6px 24px rgba(15,23,42,.12)}
    .png-actions{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;padding-top:4px;}
    .png-actions .btn{min-height:48px;font-size:15px}
    body.png-open{overflow:hidden}
    @supports (height: 100dvh){
      body,.app{min-height:100dvh}
    }
    @media (min-width:860px){
      .title{font-size:18px}
      .canvas-wrap{padding-bottom:28px}
    }
    @media (max-width:760px){
      .app{padding-left:8px;padding-right:8px}
      .title{font-size:14px}
      .version-inline{font-size:9px}
      .floating-actions{
      touch-action:manipulation;
left:6px;right:6px;bottom:calc(6px + env(safe-area-inset-bottom) + var(--vv-bottom));gap:3px;padding:4px;border-radius:15px}
      .fab{font-size:10px;min-height:32px;padding:6px 2px}
      .canvas-wrap{padding:3px 3px 14px}
    }
    @media print{
      body{background:#fff}
      .topbar,.floating-actions,.backdrop,.sheet,.toast{display:none !important}
      .app{padding:0}
      .panel{box-shadow:none;border:none;border-radius:0}
      .canvas-wrap{padding:0;overflow:visible}
      .page-shell{width:100% !important}
      svg{border-radius:0}
    }
  
    .btn-style-save{
      background:var(--primary) !important;
      color:#fff !important;
      border-color:var(--primary) !important;
    }
    .btn-style-reset{
      background:var(--danger) !important;
      color:#fff !important;
      border-color:var(--danger) !important;
    }


/* Botones inicio */

}

}

  /* Diseño visual más elegante */
  :root{
    --bg:#e9eef7;
    --card:#ffffff;
    --line:#d8e1ee;
    --text:#0f172a;
    --muted:#64748b;
    --primary:#2f66d9;
    --success:#16a34a;
    --danger:#dc2626;
    --soft:#f8fbff;
    --soft-2:#f3f7fd;
    --shadow:0 18px 40px rgba(15,23,42,.10);
  }
  html,body{
    background:
      radial-gradient(circle at top left, rgba(125,211,252,.22), transparent 28%),
      radial-gradient(circle at top right, rgba(167,139,250,.16), transparent 24%),
      linear-gradient(180deg,#edf2fa 0%, #e8eef8 100%);
  }
  .topbar{
    padding-top:8px;
    padding-bottom:8px;
  }
  .title{
    font-size:16px;
    letter-spacing:-0.04em;
  }
  .version-inline{
    font-size:11px;
    color:#64748b;
  }
  .panel{
    border:1px solid rgba(203,213,225,.9);
    box-shadow:0 18px 42px rgba(15,23,42,.08);
  }
  .floating-actions{
    background:rgba(255,255,255,.88);
    border-color:rgba(203,213,225,.95);
    box-shadow:0 18px 36px rgba(15,23,42,.14);
    backdrop-filter:blur(18px);
  }
  .fab{
    box-shadow:inset 0 1px 0 rgba(255,255,255,.18), 0 8px 16px rgba(15,23,42,.08);
  }
  .fab-new{
    background:linear-gradient(180deg,#d9f2ff 0%,#a8defb 100%);
    color:#0f172a;
    border-color:#9bd5f5;
  }
  .fab-save{
    background:linear-gradient(180deg,#22c55e 0%,#16a34a 100%);
    color:#fff;
  }
  .fab-pdf{
    background:linear-gradient(180deg,#3b82f6 0%,#2563eb 100%);
    color:#fff;
  }
  .fab-png{
    background:linear-gradient(180deg,#8b5cf6 0%,#7c3aed 100%);
    color:#fff;
  }
  .fab-settings{
    background:linear-gradient(180deg,#ef4444 0%,#dc2626 100%);
    color:#fff;
    border-color:#dc2626;
  }

  .btn,.btn-secondary{
    background:linear-gradient(180deg,#ffffff 0%,#f8fafc 100%);
    border:1px solid #d4dde9;
    color:#0f172a;
    box-shadow:0 8px 18px rgba(15,23,42,.06);
  }
  .btn:active,.btn-secondary:active,.fab:active,.settings-item:active{
    transform:translateY(1px) scale(.985);
  }
  .btn-primary,.btn-style-save{
    background:linear-gradient(180deg,#3b82f6 0%,#2563eb 100%) !important;
    border-color:#2563eb !important;
    color:#fff !important;
  }
  .btn-success{
    background:linear-gradient(180deg,#22c55e 0%,#16a34a 100%) !important;
    border-color:#16a34a !important;
    color:#fff !important;
  }
  .btn-danger,.btn-style-reset{
    background:linear-gradient(180deg,#ef4444 0%,#dc2626 100%) !important;
    border-color:#dc2626 !important;
    color:#fff !important;
  }

  .saved-trash-btn{
    background:#fff7f7 !important;
    color:#b84a4a !important;
    border:1px solid #efc3c3 !important;
    box-shadow:none !important;
    min-width:64px !important;
    padding:0 10px !important;
    font-size:28px !important;
    line-height:1 !important;
  }
  .btn-neutral{
    background:linear-gradient(180deg,#ffffff 0%,#eef3f9 100%) !important;
    border-color:#d4dde9 !important;
    color:#0f172a !important;
  }

  .sheet{
    background:linear-gradient(180deg,#ffffff 0%,#f7faff 100%);
    border:1px solid #d5dfeb;
    box-shadow:0 -18px 48px rgba(15,23,42,.18);
  }
  .sheet-head{
    background:
      linear-gradient(180deg,rgba(255,255,255,.98) 0%,rgba(246,250,255,.96) 100%);
    border-bottom:1px solid rgba(216,225,238,.85);
    padding-top:18px;
    padding-bottom:14px;
  }
  .sheet-title{
    font-size:19px;
    letter-spacing:-0.03em;
  }
  .sheet label{
    font-size:12px;
    letter-spacing:-0.01em;
    color:#0f172a;
  }
  .sheet input,.sheet textarea,.sheet select{
    background:linear-gradient(180deg,#ffffff 0%,#fbfdff 100%);
    border:1px solid #d4dde9;
    box-shadow:inset 0 1px 2px rgba(15,23,42,.03);
  }
  .sheet-actions{
    background:linear-gradient(to top, rgba(247,250,255,.98) 72%, rgba(247,250,255,.88) 100%);
    border-top:1px solid rgba(216,225,238,.7);
  }

  .style-card{
    background:linear-gradient(180deg,#ffffff 0%,#f8fbff 100%);
    border:1px solid #d7e2ef;
    box-shadow:0 10px 24px rgba(15,23,42,.05);
  }
  .style-card h3{
    font-size:15px;
    letter-spacing:-0.02em;
  }

  .saved-item, .template-card{
    background:linear-gradient(180deg,#ffffff 0%,#f7fbff 100%) !important;
    border:1px solid #d6e0ec !important;
    box-shadow:0 10px 24px rgba(15,23,42,.05);
    border-radius:18px !important;
  }

  .saved-budget-card{
    background:linear-gradient(180deg,#d7b28c 0%, #c89a72 100%) !important;
    border:1px solid #9c6d46 !important;
    box-shadow:0 10px 24px rgba(108,72,44,.16) !important;
    border-radius:18px !important;
  }

  .btn-icon, #btnCloseSheet, #btnCloseSettings{
    background:linear-gradient(180deg,#ffffff 0%,#f8fafc 100%);
    border:1px solid #d4dde9;
    box-shadow:0 8px 18px rgba(15,23,42,.06);
  }


/* v2.85.71 selector tipo de presupuesto */
.budget-type-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px}
.budget-type-card{
  border:1px solid var(--line);
  background:linear-gradient(180deg,#ffffff 0%,#f8fbff 100%);
  border-radius:18px;
  padding:16px 14px;
  text-align:left;
  box-shadow:0 10px 24px rgba(15,23,42,.06);
  min-height:112px;
}
.budget-type-card strong{display:block;font-size:17px;margin-bottom:6px;color:#0f172a}
.budget-type-card span{display:block;font-size:13px;line-height:1.25;color:#64748b;font-weight:700}
.budget-type-card.visual{border-color:#bfdbfe}
.budget-type-card.simple{border-color:#bbf7d0}
.budget-type-card:active{transform:translateY(1px) scale(.985)}
@media (max-width:640px){.budget-type-grid{grid-template-columns:1fr}}


/* v2.85.71 - teclado iPhone seguro SOLO en panel de edición */
#editSheet.field-focus-mode{
  top: 72px !important;
  bottom: auto !important;
  height: calc(var(--app-vh) - 72px) !important;
  max-height: calc(var(--app-vh) - 72px) !important;
  transform: translateY(0) !important;
  border-radius: 0 !important;
  padding-bottom: calc(180px + env(safe-area-inset-bottom)) !important;
  scroll-padding-top: 105px !important;
  scroll-padding-bottom: 260px !important;
}
#editSheet.field-focus-mode .sheet-head{
  top: -16px !important;
}
#editSheet.field-focus-mode .sheet-actions{
  position: static !important;
  bottom: auto !important;
  margin-top: 18px !important;
  padding-bottom: 30px !important;
}
#editSheet.field-focus-mode input,
#editSheet.field-focus-mode textarea{
  scroll-margin-top: 115px !important;
  scroll-margin-bottom: 280px !important;
}
#editSheet.field-focus-mode textarea{
  min-height: 190px;
}
#editSheet.field-focus-mode ~ .return-app-btn,
body.editing-field .return-app-btn{
  display:none !important;
}

<script>
(function(){
  'use strict';

  function confirmarBorradoSeguro(titulo, texto){
    return new Promise(function(resolve){
      const overlay = document.getElementById('safeDeleteOverlay');
      const titleEl = document.getElementById('safeDeleteTitle');
      const textEl = document.getElementById('safeDeleteText');
      const cancelBtn = document.getElementById('safeDeleteCancel');
      const okBtn = document.getElementById('safeDeleteOk');

      if(!overlay || !cancelBtn || !okBtn){
        resolve(false);
        return;
      }

      if(titleEl) titleEl.textContent = titulo || 'Eliminar documento';
      if(textEl) textEl.textContent = texto || '¿Seguro que quieres eliminarlo?';

      function cerrar(valor){
        overlay.classList.remove('show');
        overlay.setAttribute('aria-hidden','true');
        cancelBtn.onclick = null;
        okBtn.onclick = null;
        resolve(valor);
      }

      cancelBtn.onclick = function(ev){
        if(ev){ ev.preventDefault(); ev.stopPropagation(); }
        cerrar(false);
      };
      okBtn.onclick = function(ev){
        if(ev){ ev.preventDefault(); ev.stopPropagation(); }
        cerrar(true);
      };

      overlay.classList.add('show');
      overlay.setAttribute('aria-hidden','false');
    });
  }

  function elegirModoFactura(){
    return new Promise(function(resolve){
      const overlay = document.getElementById('convertFacturaOverlay');
      const btnCon = document.getElementById('convertFacturaCon');
      const btnSin = document.getElementById('convertFacturaSin');
      const btnCancel = document.getElementById('convertFacturaCancel');

      if(!overlay || !btnCon || !btnSin || !btnCancel){
        resolve({cancelado:false, sinImagenes:false});
        return;
      }

      function cerrar(valor){
        overlay.classList.remove('show');
        overlay.setAttribute('aria-hidden','true');
        btnCon.onclick = null;
        btnSin.onclick = null;
        btnCancel.onclick = null;
        resolve(valor);
      }

      btnCon.onclick = function(ev){
        if(ev){ ev.preventDefault(); ev.stopPropagation(); }
        cerrar({cancelado:false, sinImagenes:false});
      };
      btnSin.onclick = function(ev){
        if(ev){ ev.preventDefault(); ev.stopPropagation(); }
        cerrar({cancelado:false, sinImagenes:true});
      };
      btnCancel.onclick = function(ev){
        if(ev){ ev.preventDefault(); ev.stopPropagation(); }
        cerrar({cancelado:true, sinImagenes:false});
      };

      overlay.classList.add('show');
      overlay.setAttribute('aria-hidden','false');
    });
  }


  const NS = 'http://www.w3.org/2000/svg';
  const STORAGE_KEY = 'presupuesto_directo_pdf_v2_05_current';
  const RETURN_APP_PENDING_KEY = 'presupuesto_directo_png_return_pending';
  const SAVE_LIST_KEY = 'presupuesto_directo_pdf_v2_05_list';
  const BACKUP_KEY = 'presupuesto_directo_pdf_v2_28_last_backup';
  const FACTURACION_BRIDGE_KEY = 'rey_external_visual_budget_v1';
  const FACTURACION_APP_URL = 'factura.html';
  const FACTURACION_START_TYPE_KEY = 'documentos_rey_start_type';
  const PRESUPUESTO_VISUAL_BRIDGE_KEY = 'rey_presupuesto_visual_bridge_v1';
  const DESIGN_RETURN_IMG_KEY = 'presupuesto_visual_design_return_img_v1';
  const DESIGN_RETURN_INDEX_KEY = 'presupuesto_visual_design_target_index_v1';
  const DESIGN_APP_URL = 'ventana.html'; // v2.86.01: Ventana Pro conectada con retorno de imagen

  function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }
  function applyZoom(){
    if(!pageShell || !canvasWrap) return;
    const wrapRect = canvasWrap.getBoundingClientRect();
    const available = Math.max(260, Math.floor(wrapRect.width - 24));
    pageShell.style.width = Math.max(220, Math.round(available * zoomLevel)) + 'px';

  function setZoom(next){
    zoomLevel = clamp(Number(next || 1), ZOOM_MIN, ZOOM_MAX);
    applyZoom();

  function touchDistance(t1, t2){
    const dx = t2.clientX - t1.clientX;
    const dy = t2.clientY - t1.clientY;
    return Math.hypot(dx, dy);
  }
  function touchMidpoint(t1, t2){
    return { x:(t1.clientX + t2.clientX) / 2, y:(t1.clientY + t2.clientY) / 2 };
  }
  function zoomAroundPoint(nextZoom, clientX, clientY){
    if(!canvasWrap || !pageShell) return;
    const rect = canvasWrap.getBoundingClientRect();
    const localX = clientX - rect.left + canvasWrap.scrollLeft;
    const localY = clientY - rect.top + canvasWrap.scrollTop;
    const ratioX = localX / Math.max(1, pageShell.offsetWidth);
    const ratioY = localY / Math.max(1, pageShell.offsetHeight);
    setZoom(nextZoom);
    const nextW = pageShell.offsetWidth;
    const nextH = pageShell.offsetHeight;
    canvasWrap.scrollLeft = Math.max(0, ratioX * nextW - (clientX - rect.left));
    canvasWrap.scrollTop = Math.max(0, ratioY * nextH - (clientY - rect.top));
  }
  function installPinchZoom(){
    if(!canvasWrap) return;
    canvasWrap.addEventListener('touchstart', function(e){
      if(e.touches.length !== 2) return;
      const t1 = e.touches[0], t2 = e.touches[1];
      pinchState = {
        startDistance: touchDistance(t1, t2),
        startZoom: zoomLevel,
        midpoint: touchMidpoint(t1, t2)
      };
    }, { passive:true });
    canvasWrap.addEventListener('touchmove', function(e){
      if(!pinchState || e.touches.length !== 2) return;
      e.preventDefault();
      const t1 = e.touches[0], t2 = e.touches[1];
      const distance = touchDistance(t1, t2);
      const midpoint = touchMidpoint(t1, t2);
      const nextZoom = pinchState.startZoom * (distance / Math.max(1, pinchState.startDistance));
      zoomAroundPoint(nextZoom, midpoint.x, midpoint.y);
      pinchState.midpoint = midpoint;
    }, { passive:false });
    function endPinch(){ pinchState = null; }
    canvasWrap.addEventListener('touchend', endPinch, { passive:true });
    canvasWrap.addEventListener('touchcancel', endPinch, { passive:true });
  }

  function isInsideCanvasWrap(target){

  function installViewportLock(){
    document.addEventListener('gesturestart', function(e){
      if(!isInsideCanvasWrap(e.target)) e.preventDefault();
    }, { passive:false });
    document.addEventListener('gesturechange', function(e){

    document.addEventListener('gestureend', function(e){

    }, { passive:false });
    document.addEventListener('touchmove', function(e){
      if(e.touches && e.touches.length > 1 && !isInsideCanvasWrap(e.target)) e.preventDefault();
    }, { passive:false });
  }

  function today(){ return new Date().toISOString().slice(0,10); }
  function addDays(dateStr, days){
    const d = new Date((dateStr || today()) + 'T12:00:00');
    d.setDate(d.getDate() + Number(days || 0));
    return d.toISOString().slice(0,10);
  }
  function fmtDate(dateStr){
    if(!dateStr) return '';
    const [y,m,d] = String(dateStr).split('-');
    return y && m && d ? `${d}/${m}/${y}` : String(dateStr);
  }

  function formatBudgetNumber(year, seq){
    const safeYear = String(Number(year) || currentBudgetYear()).padStart(4,'0').slice(-4);

    return `P-${safeYear}-${String(safeSeq).padStart(4,'0')}`;
  }
  function parseBudgetNumber(value){
    const m = String(value || '').trim().toUpperCase().match(/^P-(\d{4})-(\d{4})$/);

  }

  function parseDocumentSequence(num){

  function sortDocumentEntries(entries, order){
    const arr = (entries || []).slice();
    arr.sort(function(a,b){
      const da = a.item || {};
      const db = b.item || {};
      if(order === 'num_asc' || order === 'num_desc'){
        const pa = parseDocumentSequence(da.numero);
        const pb = parseDocumentSequence(db.numero);
        const diff = (pa.year - pb.year) || (pa.seq - pb.seq) || String(da.numero||'').localeCompare(String(db.numero||''));
        return order === 'num_asc' ? diff : -diff;
      }
      if(order === 'fecha_asc' || order === 'fecha_desc'){
        const diff = String(da.fecha || '').localeCompare(String(db.fecha || ''));
        return order === 'fecha_asc' ? diff : -diff;
      }
      const diff = String(da.clienteNombre || '').localeCompare(String(db.clienteNombre || ''));
      return diff || String(da.numero || '').localeCompare(String(db.numero || ''));
    });
    return arr;
  }

  async function nextDocumentNumberForType(type){
    type = type || 'presupuesto';
    const prefix = documentTypePrefix(type);
    const year = docNumberYear();
    let list = [];
    try {
      list = await loadSavedList();
    } catch(e) {
      list = [];
    }

    let max = 0;
    (list || []).forEach(function(d){
      const n = String(d && d.numero || '');
      const t = d && d.documentoTipo ? d.documentoTipo : 'presupuesto';
      if(t !== type) return;
      const re = new RegExp('^' + prefix + '-' + year + '-(\\d+)$');
      const m = n.match(re);
      if(m) max = Math.max(max, Number(m[1] || 0));
    });
    return prefix + '-' + year + '-' + String(max + 1).padStart(4, '0');
  }

  async function ensureUniqueDocumentNumber(doc, list){
    if(!doc) return doc;
    const tipo = doc.documentoTipo || 'presupuesto';
    const currentId = String(doc.documentId || '');
    const currentNum = String(doc.numero || '');
    const exists = (list || []).some(function(x){
      if(!x) return false;
      const sameType = String(x.documentoTipo || 'presupuesto') === tipo;
      const sameNum = String(x.numero || '') === currentNum;
      const sameId = currentId && String(x.documentId || '') === currentId;
      return sameType && sameNum && !sameId;
    });
    if(!currentNum || exists){
      doc.numero = await nextDocumentNumberForType(tipo);
    }
    return doc;
  }

  function ensureFieldVisible(field){
    if(!field) return;
    const sheet = field.closest('.sheet') || getOpenSheet();
    if(!sheet) return;

    const vv = window.visualViewport;
    const viewportHeight = vv ? vv.height : window.innerHeight;
    const keyboardCut = vv ? Math.max(0, window.innerHeight - (vv.height + vv.offsetTop)) : 0;
    const extraBottom = Math.max(150, keyboardCut + 110);

    const fieldRect = field.getBoundingClientRect();
    const sheetRect = sheet.getBoundingClientRect();

    const topInset = 90;
    const visibleBottom = viewportHeight - extraBottom;

    if(fieldRect.bottom > visibleBottom || fieldRect.top < sheetRect.top + topInset){
      const currentScroll = sheet.scrollTop;
      const targetTop = currentScroll + (fieldRect.top - sheetRect.top) - topInset;
      try{

        sheet.scrollTop = Math.max(0, targetTop);
      }
    }
  }

  function footerTotalsForPage(pageNumber, forExport){
    const totalPages = forExport ? getExportPageCount() : getAppPageCount();
    const currentIndex = Math.max(0, Number(pageNumber || 1) - 1);
    const currentItems = getPageItems(currentIndex, !!forExport);
    const current = totalsFromItems(currentItems);
    let previousBase = 0;
    for(let i=0;i<currentIndex;i++) previousBase += totalsFromItems(getPageItems(i, !!forExport)).base;
    const accumulatedBase = previousBase + current.base;
    const accumulatedIva = accumulatedBase * IVA;
    return {
      multiPage: totalPages > 1 && currentIndex > 0,
      currentBase: current.base,
      previousBase,
      accumulatedBase,
      accumulatedIva,
      accumulatedTotal: accumulatedBase + accumulatedIva,
      pageCount: totalPages
    };
  }

  function measureSvgTextWidth(text, fontSize, fontWeight){
    if(!measureSvgTextWidth.canvas){
      measureSvgTextWidth.canvas = document.createElement('canvas');
      measureSvgTextWidth.ctx = measureSvgTextWidth.canvas.getContext('2d');
    }
    const ctx = measureSvgTextWidth.ctx;
    ctx.font = `${fontWeight || '400'} ${fontSize || 16}px Arial`;
    return ctx.measureText(String(text || '')).width;
  }
  function wrapTextByWidth(text, maxWidth, fontSize, fontWeight){
    const src = String(text || '').replace(/\r/g,'').split('\n');
    const out = [];
    src.forEach(rawLine => {
      const line = String(rawLine || '').replace(/\t/g,' ').trimEnd();
      if(!line.trim()){ out.push(''); return; }
      const words = line.split(/\s+/).filter(Boolean);
      let cur = '';
      words.forEach(word => {
        const probe = cur ? cur + ' ' + word : word;
        if(cur && measureSvgTextWidth(probe, fontSize, fontWeight) > maxWidth){
          out.push(cur);
          if(measureSvgTextWidth(word, fontSize, fontWeight) <= maxWidth){
            cur = word;
          } else {
            let chunk = '';
            Array.from(word).forEach(ch => {
              const test = chunk + ch;
              if(chunk && measureSvgTextWidth(test, fontSize, fontWeight) > maxWidth){
                out.push(chunk);
                chunk = ch;
              } else {
                chunk = test;
              }
            });
            cur = chunk;
          }
        } else {
          cur = probe;
        }
      });
      if(cur) out.push(cur);
    });
    return out.length ? out : [''];
  }

  function wrapTextToVariableWidths(text, maxWidths, fontSize, fontWeight){
    const widths = Array.isArray(maxWidths) && maxWidths.length ? maxWidths.map(v => Math.max(8, Number(v) || 0)) : [320];
    const src = String(text || '').replace(/\r/g,'').split('\n');
    const out = [];
    function widthForLine(index){
      return widths[Math.min(index, widths.length - 1)];
    }
    function pushLongWord(word){
      let chunk = '';
      Array.from(word).forEach(ch => {
        const lineIndex = out.length;
        const maxWidth = widthForLine(lineIndex);
        const test = chunk + ch;
        if(chunk && measureSvgTextWidth(test, fontSize, fontWeight) > maxWidth){
          out.push(chunk);
          chunk = ch;
        } else {
          chunk = test;
        }
      });
      return chunk;
    }
    src.forEach(rawLine => {
      const line = String(rawLine || '').replace(/\t/g,' ').trimEnd();
      if(!line.trim()){ out.push(''); return; }
      const words = line.split(/\s+/).filter(Boolean);
      let cur = '';
      words.forEach(word => {
        const lineIndex = out.length;
        const maxWidth = widthForLine(lineIndex);
        const probe = cur ? cur + ' ' + word : word;
        if(cur && measureSvgTextWidth(probe, fontSize, fontWeight) > maxWidth){
          out.push(cur);
          const nextWidth = widthForLine(out.length);
          if(measureSvgTextWidth(word, fontSize, fontWeight) <= nextWidth){
            cur = word;
          } else {
            cur = pushLongWord(word);
          }
        } else if(!cur && measureSvgTextWidth(word, fontSize, fontWeight) > maxWidth){
          cur = pushLongWord(word);
        } else {
          cur = probe;
        }
      });
      if(cur) out.push(cur);
    });
    return out.length ? out : [''];
  }

  function openDb(){
    return new Promise((resolve, reject) => {
      if(!window.indexedDB) return reject(new Error('IndexedDB no disponible'));
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = function(){
        const db = req.result;
        if(!db.objectStoreNames.contains(DB_STORE)) db.createObjectStore(DB_STORE);
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error || new Error('Error IndexedDB'));
    });
  }
  async function idbGet(key){
    const db = await openDb();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(DB_STORE, 'readonly');
      const store = tx.objectStore(DB_STORE);
      const req = store.get(key);
      req.onsuccess = () => resolve(req.result == null ? null : req.result);
      req.onerror = () => reject(req.error || new Error('Error lectura'));
      tx.oncomplete = () => db.close();
      tx.onabort = () => db.close();
    });
  }
  async function idbSet(key, value){
    const db = await openDb();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(DB_STORE, 'readwrite');
      tx.objectStore(DB_STORE).put(value, key);
      tx.oncomplete = () => { db.close(); resolve(true); };
      tx.onerror = () => { db.close(); reject(tx.error || new Error('Error escritura')); };
      tx.onabort = () => { db.close(); reject(tx.error || new Error('Abortado')); };
    });
  }
  async function idbRemove(key){
    const db = await openDb();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(DB_STORE, 'readwrite');
      tx.objectStore(DB_STORE).delete(key);
      tx.oncomplete = () => { db.close(); resolve(true); };
      tx.onerror = () => { db.close(); reject(tx.error || new Error('Error borrado')); };
      tx.onabort = () => { db.close(); reject(tx.error || new Error('Abortado')); };
    });
  }

  function slugImageName(s){
    return String(s || '')
      .trim()
      .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
      .replace(/[^a-zA-Z0-9._-]+/g,'_')
      .replace(/^_+|_+$/g,'');
  }

  function normalizeImagePath(src){
    let s = String(src || '').trim().replace(/\\/g,'/');
    if(!s) return '';
    if(s.startsWith('data:image') || /^https?:\/\//i.test(s)) return s;

    // GitHub: imágenes del catálogo en carpeta img.
    s = s.replace(/^\.\//,'').replace(/^\//,'');
    if(s.toLowerCase().startsWith('img/')) return s;

    const file = s.split('/').pop();
    return file ? ('img/' + file) : '';
  }

  function expandImageCandidates(value){
    const raw0 = String(value || '').trim().replace(/\\/g,'/');
    if(!raw0) return [];
    if(raw0.startsWith('data:image')) return [raw0];
    if(/^https?:\/\//i.test(raw0)) return [raw0];

    const raw = normalizeImagePath(raw0);
    const out = [];
    const add = function(v){
      v = String(v || '').trim();
      if(v && !out.includes(v)) out.push(v);
    };

    const addRelativeVariants = function(v){
      add(v);
      if(!v.startsWith('./') && !v.startsWith('/')) add('./' + v);
    };

    addRelativeVariants(raw);

    // Compatibilidad: si hay productos antiguos guardados solo como IMG_0001.JPG,
    // también probamos la variante img/IMG_0001.JPG.
    const fileOnly = raw0.replace(/^\.\//,'').replace(/^\//,'').split('/').pop();
    if(fileOnly && raw !== fileOnly){
      addRelativeVariants('img/' + fileOnly);
    }

    const hasExt = /\.(jpg|jpeg|png|webp|gif|svg)$/i.test(raw);
    if(!hasExt){
      ['.jpg','.JPG','.jpeg','.JPEG','.png','.PNG','.webp','.WEBP'].forEach(function(ext){
        addRelativeVariants(raw + ext);
      });
    }

    const baseRaw = raw.replace(/\.(jpg|jpeg|png|webp|gif|svg)$/i, '');
    const base = slugImageName(baseRaw.split('/').pop());
    if(base){
      addRelativeVariants('img/' + base);
      ['.jpg','.JPG','.jpeg','.JPEG','.png','.PNG','.webp','.WEBP'].forEach(function(ext){
        addRelativeVariants('img/' + base + ext);
      });
    }

    return out;
  }

  function productImageCandidates(p){
    const out = [];
    const addAll = function(arr){
      (arr || []).forEach(function(v){
        expandImageCandidates(v).forEach(function(x){
          if(x && !out.includes(x)) out.push(x);
        });
      });
    };

    addAll(productImageRawCandidates(p));

    // Si Facturación guarda la imagen en la carpeta con el nombre/ref/id del producto,
    // probamos esos nombres como hace el navegador con rutas relativas.
    addAll([
      p && p.id,
      p && p.ref,
      p && p.codigo,
      p && p.referencia,
      p && p.nombre
    ]);

    return out;
  }

  function syncCurrentBudgetToFacturacionStorage(){
    try{
      const payload = buildFacturacionBridgePayload();
      let historial = JSON.parse(localStorage.getItem('rey_presu_history') || '[]');
      if(!Array.isArray(historial)) historial = [];

      let incomingNum = String(payload.numero || state.numero || '').trim();
      let targetId = String(state.facturacionId || payload.facturacionId || '').trim();
      let idx = -1;

      if(targetId){
        idx = historial.findIndex(h => String((h && h.id) || '') === targetId);
      }
      if(idx < 0 && incomingNum){
        idx = historial.findIndex(h => String((h && (h.num || h.numero)) || '').trim() === incomingNum);
        if(idx >= 0 && historial[idx] && historial[idx].id) targetId = historial[idx].id;
      }

      // Si es nuevo, Facturación manda en la numeración
      if(!targetId){
        const safeYear = currentBudgetYear();
        let maxSeq = 0;
        historial.forEach(h => {
          const parsed = parseBudgetNumber(h && (h.num || h.numero));
          if(parsed && parsed.year === safeYear && parsed.seq > maxSeq) maxSeq = parsed.seq;
        });
        incomingNum = formatBudgetNumber(safeYear, maxSeq + 1);
      }

      if(!targetId) targetId = String(payload.bridgeId || ('pv_' + Date.now()));
      const prevEstado = (idx >= 0 && historial[idx] && historial[idx].estado) ? historial[idx].estado : '';

      const item = {
        id: targetId,
        num: incomingNum,
        fecha: String(payload.fecha || ''),
        venc: String(payload.venc || ''),
        cliente: String(payload.cliente || ''),
        nif: String(payload.nif || ''),
        dir: String(payload.dir || ''),
        prov: String(payload.prov || ''),
        tel: String(payload.tel || ''),
        loc: String(payload.loc || ''),
        filas: Array.isArray(payload.filas) ? payload.filas : [],
        template: 'visual',
        accountLine2: String(state.accountLine2 || payload.accountLine2 || ''),
        accountLine3: String(state.accountLine3 || payload.accountLine3 || ''),
        totalStr: String(payload.totalStr || formatMoney(payload.total || 0)),
        ivaStr: String(payload.ivaStr || '0,00 €'),
        estado: prevEstado || String(payload.estado || 'creado'),
        sourceApp: String(payload.sourceApp || 'presupuesto_visual'),
        bridgeId: String(payload.bridgeId || '')
      };

      if(idx >= 0) historial[idx] = item; else historial.unshift(item);
      localStorage.setItem('rey_presu_history', JSON.stringify(historial));

      state.facturacionId = targetId;
      state.numero = incomingNum;
      return true;
    }catch(err){
      console.error(err);
      return false;
    }
  }

  function hit(parent, x, y, w, h, onTap, title){
    const el = add(parent, 'rect', { x, y, width:w, height:h, fill:'transparent', stroke:'transparent', 'stroke-width':1, rx:2, ry:2, cursor:'pointer' });
    el.setAttribute('role','button');
    if(title) el.setAttribute('aria-label', title);

    let tapState = null;
    const MOVE_LIMIT = 12;
    const TIME_LIMIT = 450;

    el.addEventListener('pointerdown', function(e){
      tapState = {
        x: e.clientX,
        y: e.clientY,
        t: Date.now(),
        id: e.pointerId,
        sx: window.scrollX,
        sy: window.scrollY
      };
    }, false);

    el.addEventListener('pointerup', function(e){
      if(!tapState || tapState.id !== e.pointerId) return;
      const dx = Math.abs(e.clientX - tapState.x);
      const dy = Math.abs(e.clientY - tapState.y);
      const dt = Date.now() - tapState.t;
      const scrolled = Math.abs(window.scrollX - tapState.sx) > 2 || Math.abs(window.scrollY - tapState.sy) > 2;
      const isTap = dx <= MOVE_LIMIT && dy <= MOVE_LIMIT && dt <= TIME_LIMIT && !scrolled;
      tapState = null;
      if(!isTap) return;
      e.preventDefault();
      onTap(e);
    }, false);

    el.addEventListener('pointercancel', function(){ tapState = null; }, false);
    el.addEventListener('pointerleave', function(e){
      if(!tapState) return;
      const dx = Math.abs(e.clientX - tapState.x);
      const dy = Math.abs(e.clientY - tapState.y);
      if(dx > MOVE_LIMIT || dy > MOVE_LIMIT) tapState = null;
    }, false);

    return el;
  }


  function conceptHasContent(item){
    if(!item) return false;
    const txt = String(item.text || '').trim();
    const img = String(item.image || '').trim();
    const units = String(item.units == null ? '' : item.units).trim();
    const priceRaw = String(item.price == null ? '' : item.price).trim().replace(',', '.');
    const price = Number(priceRaw || '0');
    return !!txt || !!img || (units !== '' && units !== '1') || (!Number.isNaN(price) && price > 0);
  }

  function removeLastEmptyConceptPage(items){
    const src = Array.isArray(items) ? items.slice() : [];
    if(src.length <= CONCEPTS_PER_PAGE) return { changed:false, items: ensureConceptList(src) };
    const lastPageStart = Math.max(0, src.length - CONCEPTS_PER_PAGE);
    const lastPage = src.slice(lastPageStart);
    const isLastPageEmpty = lastPage.every(it => !conceptHasContent(it));
    if(!isLastPageEmpty) return { changed:false, items: ensureConceptList(src) };
    const trimmed = src.slice(0, lastPageStart);
    return { changed:true, items: ensureConceptList(trimmed) };
  }


  function getAllItems(){
    return ensureConceptList(Array.isArray(state.items) ? state.items : []);
  }

  function getSimpleRowsPerPage(){ return 99; }

  function simpleMaxTableHeight(){
    // Altura máxima para que el bloque final siempre quede debajo sin pisarse.
    return 470;
  }

  function simpleConceptColumnWidth(){
    const conceptX = 26;
    const conceptW = 742;
    const colUds = conceptX + Math.round(conceptW * 0.50);
    return colUds - conceptX - 16;
  }

  function simpleRowHeight(it){
    const minRowH = 26;
    const lineHeight = 14;
    const desc = String(it && it.text || '').trim();
    const lines = wrapTextByWidth(desc, simpleConceptColumnWidth(), 10.8, '400');
    return Math.max(minRowH, 8 + (Math.max(1, lines.length) * lineHeight));
  }

  function simplePaginateItems(){
    const all = getAllItems();
    const perPage = getSimpleRowsPerPage();
    const minPages = Math.max(1, Number(state.simpleExtraPages || 1));

    // Importante: en modo sencillo NO compactamos los conceptos.
    // Respetamos el índice donde se creó cada línea para que una línea añadida
    // en la página 2 siga apareciendo en la página 2.
    let maxPage = minPages - 1;
    all.forEach(function(it, idx){
      if(conceptHasContent(it)){
        maxPage = Math.max(maxPage, Math.floor(idx / perPage));
      }
    });

    const pages = Array.from({length: maxPage + 1}, function(){ return []; });
    all.forEach(function(it, idx){
      if(conceptHasContent(it)){
        const p = Math.floor(idx / perPage);
        pages[p].push(it);
      }
    });

    if(!pages.length) return [[all[0] || blankConcept(conceptCodeForIndex(0))]];
    return pages;
  }

  function getAppPageCount(){
    if(isSimpleBudget()){
      return Math.max(simplePaginateItems().length, Math.max(1, Number(state.simpleExtraPages || 1)));
    }
    return Math.max(1, Math.ceil(getAllItems().length / CONCEPTS_PER_PAGE));
  }

  function getExportItems(){
    return getAllItems().filter(conceptHasContent);
  }

  function getExportPageCount(){
    if(isSimpleBudget()) return simplePaginateItems().length;
    const usedCount = getExportItems().length;
    return Math.max(1, Math.ceil(Math.max(1, usedCount) / CONCEPTS_PER_PAGE));
  }

  function getPageItems(pageIndex, forExport){
    if(isSimpleBudget()){
      const pages = simplePaginateItems();
      const requested = Math.max(0, Number(pageIndex || 0));
      const idx = Math.max(0, Math.min(Math.max(pages.length, Number(state.simpleExtraPages || 1)) - 1, requested));
      const page = (pages[idx] || []).slice();

      // En edición, una página añadida manualmente puede estar vacía.
      // Debe mostrar una línea editable aunque todavía no tenga conceptos reales.
      if(!forExport && idx >= pages.length){
        const startIdx = idx * getSimpleRowsPerPage();
        const existing = getAllItems()[startIdx] || blankConcept(conceptCodeForIndex(startIdx));
        return [existing];
      }

      // En edición, la última página añade una fila vacía para crear otro concepto,
      // solo si cabe dentro del alto seguro.
      if(!forExport && idx === Math.max(pages.length, Number(state.simpleExtraPages || 1)) - 1){
        const headerH = 24;
        let h = headerH + page.reduce(function(sum, it){ return sum + simpleRowHeight(it); }, 0);
        const blank = blankConcept(conceptCodeForIndex(idx * getSimpleRowsPerPage() + page.length));
        const blankH = simpleRowHeight(blank);
        if(h + blankH <= simpleMaxTableHeight()) page.push(blank);
      }
      return page;
    }

    const perPage = CONCEPTS_PER_PAGE;
    const start = Math.max(0, Number(pageIndex || 0)) * perPage;
    if(forExport){
      const used = getExportItems();
      if(!used.length){
        const fallback = getAllItems()[0] || blankConcept(conceptCodeForIndex(0));
        return [fallback];
      }
      return used.slice(start, start + perPage);
    }
    return getAllItems().slice(start, start + perPage);
  }

  function simpleHasDiscount(items){
    return (items || []).some(function(it){
      const raw = it && (it.discount != null ? it.discount : it.dto);
      if(raw == null || String(raw).trim() === '') return false;
      return Number(String(raw).replace(',','.')) > 0;
    });
  }

  function renderSimpleConceptTable(root, items, x, y, w, h, pageNumber, totalPages, forExport){
    const s = sty();
    const lineColor = s.conceptLineColor || '#000000';
    const lineW = Math.max(1, Number(s.conceptLineWidth || s.lineWidth || 1));
    const headerH = 24;
    const minRowH = 26;
    const lineHeight = 14;
    const showDto = simpleHasDiscount(getAllItems());

    const colUds = x + Math.round(w * 0.50);
    const colBaseUds = x + Math.round(w * 0.57);
    const colDto = showDto ? x + Math.round(w * 0.69) : null;
    const colBaseTotal = showDto ? x + Math.round(w * 0.79) : x + Math.round(w * 0.71);
    const colIvaPct = showDto ? x + Math.round(w * 0.88) : x + Math.round(w * 0.84);
    const colIva = showDto ? x + Math.round(w * 0.93) : x + Math.round(w * 0.92);

    let renderItems = (items || []).filter(function(it){
      return forExport ? conceptHasContent(it) : true;
    });
    const pageStart = (Number(pageNumber || 1)-1) * getSimpleRowsPerPage();

    if(!renderItems.length) renderItems = [blankConcept(conceptCodeForIndex(pageStart))];

    // Altura exacta: cabecera + filas reales/editables.
    let exactH = headerH;
    const rowHeights = renderItems.map(function(it){
      const desc = String(it && it.text || '').trim();
      const conceptMaxW = colUds - x - 16;
      const lines = wrapTextByWidth(desc, conceptMaxW, 10.8, '400');
      const rh = simpleRowHeight(it);
      exactH += rh;
      return { h: rh, lines: lines };
    });
    h = exactH;

    add(root, 'rect', { x, y, width:w, height:h, fill:'#fff', stroke:'none' });

    let cy = y + headerH;
    for(let r=0; r<renderItems.length; r++){

      const globalIndex = pageStart + r;
      const row = rowHeights[r];

      // No dibujamos texto de relleno para filas vacías.

    if(totalPages > 1){
      addText(root, x+w-4, y+h-8, 'Hoja ' + pageNumber + '/' + totalPages, { fs:isFacturaDocument() ? 11 : 10, anchor:'end', fill:s.mutedColor || '#64748b' });

  function calcSimpleTableHeight(items, w, forExport){
    const headerH = 24;
    let renderItems = (items || []).slice();
    if(!renderItems.length) renderItems = [blankConcept(conceptCodeForIndex(0))];
    let total = headerH;
    renderItems.forEach(function(it){
      total += simpleRowHeight(it);
    });
    return total;
  }

  function renderPageGroup(parent, offsetY, pageItems, pageNumber, totalPages, forExport){
    const pageY = Number(offsetY || 0);
    add(parent, 'rect', {
      x:0,
      y:pageY,
      width:PAGE_W,
      height:PAGE_H,
      fill:'#ffffff',
      stroke: forExport ? 'none' : '#d5dbe5',
      'stroke-width': forExport ? 0 : 1
    });

    const root = add(parent, 'g', { transform:'translate(0 ' + pageY + ')' });
    renderHeader(root);

    const conceptZoneStretch = Number(numStyle('conceptZoneStretch')) || 0;
    const facturaHeaderOffset = isFacturaDocument() ? 94 : 0;
    const conceptX = 26;
    const conceptY = 258 + facturaHeaderOffset - conceptZoneStretch;
    const conceptW = 742;
    const conceptH = isFacturaDocument() ? 140 : (156 + Math.round(conceptZoneStretch / 4));
    const conceptGap = isFacturaDocument() ? 10 : 14;

    if(isSimpleBudget()){
      const simpleH = calcSimpleTableHeight(pageItems, conceptW, !!forExport);
      renderSimpleConceptTable(root, pageItems, conceptX, conceptY, conceptW, simpleH, pageNumber, totalPages, !!forExport);
      const footerY = conceptY + simpleH + 30;
      renderFooter(root, footerY, pageNumber, totalPages, !!forExport);
      return;
    }

    const conceptCount = forExport ? Math.max(1, Math.min(CONCEPTS_PER_PAGE, pageItems.length || 0)) : CONCEPTS_PER_PAGE;

    for(let i=0;i<conceptCount;i++){
      const conceptIndex = ((pageNumber - 1) * CONCEPTS_PER_PAGE) + i;
      renderConcept(root, pageItems[i] || blankConcept(conceptCodeForIndex(conceptIndex)), conceptX, conceptY + (i * (conceptH + conceptGap)), conceptW, conceptH);
    }

    const footerY = conceptY + (conceptCount * conceptH) + ((conceptCount - 1) * conceptGap) + 30;
    renderFooter(root, footerY, pageNumber, totalPages, !!forExport);
  }

  async function renderDocument(targetSvg, forExport){
    if(!targetSvg) return;
    targetSvg.innerHTML = '';

    const pageCount = forExport ? getExportPageCount() : getAppPageCount();
    const gap = pageCount > 1 ? PAGE_GAP : 0;
    const totalHeight = (pageCount * PAGE_H) + ((pageCount - 1) * gap);

    targetSvg.setAttribute('viewBox', '0 0 ' + PAGE_W + ' ' + totalHeight);
    add(targetSvg, 'rect', { x:0, y:0, width:PAGE_W, height:totalHeight, fill: forExport ? '#ffffff' : '#eef2f7' });

    for(let p=0;p<pageCount;p++){
      const items = getPageItems(p, !!forExport);
      const offsetY = p * (PAGE_H + gap);
      renderPageGroup(targetSvg, offsetY, items, p + 1, pageCount, !!forExport);
    }
  }

  function buildExportPageSvgs(){
    const pageCount = getExportPageCount();
    const pages = [];
    for(let p=0; p<pageCount; p++){
      const pageSvg = svgEl('svg', {
        viewBox:'0 0 ' + PAGE_W + ' ' + PAGE_H,
        xmlns:'http://www.w3.org/2000/svg',
        'xmlns:xlink':'http://www.w3.org/1999/xlink',
        'aria-label':documentTypeNameForNumber() + ' página ' + (p + 1)
      });
      renderPageGroup(pageSvg, 0, getPageItems(p, true), p + 1, pageCount, true);
      pages.push(pageSvg);
    }
    return pages;
  }

  function resolveLogoSrc(){
    return state && state.logo ? state.logo : defaultLogoSrc;
  }
  function resolveFacturaLogoSrc(){
    try{
      const active = getFacturacionEmpresaActiva ? getFacturacionEmpresaActiva() : 'A';
      const key = getFacturacionLogoKey ? getFacturacionLogoKey(active) : '';
      const logo = key ? localStorage.getItem(key) : '';
      return (logo && String(logo).startsWith('data:image')) ? logo : '';
    }catch(_){
      return '';
    }
  }

  function resolveProviderLogoSrc(){
    if(!(state && state.providerLogoEnabled)) return '';
    const preset = String(state && state.providerLogoPreset ? state.providerLogoPreset : 'cortizo');
    if(preset === 'velux') return BUILTIN_PROVIDER_LOGO_2;
    if(preset === 'custom' && state && state.providerLogo) return state.providerLogo;
    return BUILTIN_PROVIDER_LOGO_1;
  }

  async function tryLoadDefaultLogo(){
    try{

      const blob = await res.blob();
      defaultLogoSrc = await fileToDataURL(blob);

    }
    try{
      const res2 = await fetch(DEFAULT_PROVIDER_LOGO_PATH, { cache:'no-store' });

  function renderConcept(root, item, x, y, w, h){
    const s = sty();
    const conceptLineColor = s.conceptLineColor || '#000000';
    const conceptLineWidth = Math.max(1, Number(s.conceptLineWidth || s.lineWidth || 1));
    const headerH = 20;

    add(root, 'rect', { x, y, width:w, height:h, fill:'#fff', stroke:'none' });
    add(root, 'rect', { x, y, width:w, height:headerH, fill:s.conceptHeaderFill, stroke:'none' });

    add(root, 'rect', { x, y, width:w, height:conceptLineWidth, fill:conceptLineColor, stroke:'none' });
    add(root, 'rect', { x:x, y:y+h-conceptLineWidth, width:w, height:conceptLineWidth, fill:conceptLineColor, stroke:'none' });
    add(root, 'rect', { x, y, width:conceptLineWidth, height:h, fill:conceptLineColor, stroke:'none' });
    add(root, 'rect', { x:x+w-conceptLineWidth, y:y, width:conceptLineWidth, height:h, fill:conceptLineColor, stroke:'none' });
    if(!isSimpleBudget()){
      add(root, 'rect', { x:x+167-(conceptLineWidth/2), y:y, width:conceptLineWidth, height:h, fill:conceptLineColor, stroke:'none' });
    }
    add(root, 'rect', { x, y:y+headerH-(conceptLineWidth/2), width:w, height:conceptLineWidth, fill:conceptLineColor, stroke:'none' });

    if(!isSimpleBudget()){
      addText(root, x+70, y+15, 'GRÁFICO', { fs:isFacturaDocument() ? 13 : 12, fw:'700', anchor:'middle', fill:s.titleColor });
      addText(root, x+173, y+15, 'CONCEPTO', { fs:isFacturaDocument() ? 13 : 12, fw:'700', fill:s.titleColor });
    }else{
      addText(root, x+10, y+15, 'CONCEPTO', { fs:12, fw:'700', fill:s.titleColor });
    }

    const graphicColW = 167;
    const graphicPadding = 8;
    const graphicW = isSimpleBudget() ? 0 : (graphicColW - (graphicPadding * 2));
    const graphicH = Math.max(24, h - headerH - (graphicPadding * 2));
    const graphicX = x + Math.round((graphicColW - graphicW) / 2);
    const graphicY = y + headerH + Math.round(((h - headerH) - graphicH) / 2);
    if(!isSimpleBudget() && item.image) addImage(root, graphicX, graphicY, graphicW, graphicH, item.image, 'xMidYMid meet');

    const conceptYOffset = Number(numStyle('conceptYOffset')) || 0;
    const conceptCodeY = y + 38 + conceptYOffset;
    const conceptCodeX = isSimpleBudget() ? x + 12 : x + 174;
    addText(root, conceptCodeX, conceptCodeY, item.code, { fs:isFacturaDocument() ? Math.max(21, numStyle('conceptCodeSize')) : numStyle('conceptCodeSize'), fw:'400', fill:s.titleColor });

    const conceptFontSize = isFacturaDocument() ? Math.max(12, Number(numStyle('conceptTextSize')) || 0) : Math.max(8, Number(numStyle('conceptTextSize')) || 0);
    const conceptLineHeight = isFacturaDocument() ? Math.max(14, Number(numStyle('conceptLineSpacing')) || Math.max(Math.round(conceptFontSize * 1.22), conceptFontSize + 2, 15)) : Math.max(10, Number(numStyle('conceptLineSpacing')) || Math.max(Math.round(conceptFontSize * 1.25), conceptFontSize + 2.5, 16));
    const conceptTextY = y + 58 + conceptYOffset;
    const subY = y + h - 38;
    const conceptLeftX = isSimpleBudget() ? x + 12 : x + 174;
    const conceptRightPadding = 8;

    const conceptMaxWidth = (x + w) - conceptLeftX - conceptRightPadding;
    const availableHeight = Math.max(0, (y + h - 8) - conceptTextY);
    const availableLines = Math.max(1, Math.floor(availableHeight / conceptLineHeight) + 1);
    const wrapped = wrapTextByWidth(item.text || '', conceptMaxWidth, conceptFontSize, '400');
    const txt = wrapped.slice(0, availableLines);

    addMultilineText(root, conceptLeftX, conceptTextY, txt, {
      fs: conceptFontSize,
      fw: '400',
      fill: s.textColor || '#111827',
      lineHeight: conceptLineHeight
    });

    const itemCalc = calcItem(item);
    const itemDiscount = Math.max(0, Math.min(100, Number(item.discount || item.dto || 0)));
    const showDiscountColumn = itemDiscount > 0.0001;

    const subW = showDiscountColumn ? 312 : 248;
    const subCol1 = showDiscountColumn ? 44 : 48;   // Uds
    const subCol2 = showDiscountColumn ? 82 : 96;   // Precio
    const subCol3 = showDiscountColumn ? 60 : (subW - subCol1 - subCol2); // Descuento o Importe
    const subCol4 = showDiscountColumn ? (subW - subCol1 - subCol2 - subCol3) : 0; // Importe
    const subX = x + w - subW;

    add(root, 'rect', { x:subX, y:subY, width:subW, height:19, fill:s.totalsHeaderFill, stroke:'none' });
    add(root, 'line', { x1:subX, y1:subY, x2:subX+subW, y2:subY, stroke:conceptLineColor, 'stroke-width':conceptLineWidth });
    add(root, 'line', { x1:subX, y1:subY+38, x2:subX+subW, y2:subY+38, stroke:conceptLineColor, 'stroke-width':conceptLineWidth });
    add(root, 'line', { x1:subX, y1:subY, x2:subX, y2:subY+38, stroke:conceptLineColor, 'stroke-width':conceptLineWidth });
    add(root, 'line', { x1:subX+subW, y1:subY, x2:subX+subW, y2:subY+38, stroke:conceptLineColor, 'stroke-width':conceptLineWidth });
    add(root, 'line', { x1:subX+subCol1, y1:subY, x2:subX+subCol1, y2:subY+38, stroke:conceptLineColor, 'stroke-width':conceptLineWidth });
    add(root, 'line', { x1:subX+subCol1+subCol2, y1:subY, x2:subX+subCol1+subCol2, y2:subY+38, stroke:conceptLineColor, 'stroke-width':conceptLineWidth });
    if(showDiscountColumn){
      add(root, 'line', { x1:subX+subCol1+subCol2+subCol3, y1:subY, x2:subX+subCol1+subCol2+subCol3, y2:subY+38, stroke:conceptLineColor, 'stroke-width':conceptLineWidth });
    }
    add(root, 'line', { x1:subX, y1:subY+19, x2:subX+subW, y2:subY+19, stroke:conceptLineColor, 'stroke-width':conceptLineWidth });

    addText(root, subX+(subCol1/2), subY+14, 'Uds', { fs:numStyle('conceptMetaHeaderSize'), anchor:'middle' });
    addText(root, subX+subCol1+(subCol2/2), subY+14, 'Precio', { fs:numStyle('conceptMetaHeaderSize'), anchor:'middle' });

    if(showDiscountColumn){
      addText(root, subX+subCol1+subCol2+(subCol3/2), subY+14, 'Dto', { fs:numStyle('conceptMetaHeaderSize'), anchor:'middle' });

  function getFacturacionEmpresaActiva(){
    try{
      const v = String(localStorage.getItem('rey_empresa_activa') || 'A').toUpperCase();
      return v === 'B' ? 'B' : 'A';
    }catch(_){
      return 'A';
    }
  }

  function getFacturacionEmpresaKey(letter){
    return String(letter || 'A').toUpperCase() === 'B' ? 'rey_empresa_B' : 'rey_empresa_A';
  }

  function getFacturacionLogoKey(letter){
    return String(letter || 'A').toUpperCase() === 'B' ? 'rey_logo_dataurl_B' : 'rey_logo_dataurl_A';
  }

  function readFacturacionEmpresa(){
    const active = getFacturacionEmpresaActiva();
    const key = getFacturacionEmpresaKey(active);
    let data = null;
    try{
      data = JSON.parse(localStorage.getItem(key) || 'null');
    }catch(_){
      data = null;
    }
    if(!data || typeof data !== 'object') return null;
    return Object.assign({
      nombre:'',
      dir:'',
      cp:'',
      loc:'',
      prov:'',
      nif:'',
      bank1:'Forma de pago transferencia a:',
      bank2:'',
      bank3:'',
      footer:''
    }, data, { _active: active });
  }

  function aplicarEmpresaFacturacionAlState(data){
    if(!data || typeof data !== 'object') return false;

    state.empresaNombre = String(data.nombre || '').trim();
    state.empresaLine1 = String(data.dir || '').trim();
    state.empresaLine2 = String(((data.cp || '').trim() + ' ' + (data.loc || '').trim()).trim());
    state.empresaLine3 = String(data.prov || '').trim();
    state.empresaLine4 = String(data.nif || '').trim();

    // Facturación manda también en banco. En Documentos el título se pinta fijo.
    state.accountLine2 = String(data.bank2 || '').trim();
    state.accountLine3 = String(data.bank3 || '').trim();
    if(state.accountLine2 || state.accountLine3) saveStoredBankInfo();

    // El logo NO se copia a state.logo.
    // Presupuesto y albarán mantienen el logo actual de Documentos.
    // Las facturas leen el logo especial directamente al pintar.
    return true;
  }

  function sincronizarEmpresaDesdeFacturacion(){
    const data = readFacturacionEmpresa();
    return aplicarEmpresaFacturacionAlState(data);
  }

  async function importarEmpresaDesdeFacturacion(auto){
    const ok = sincronizarEmpresaDesdeFacturacion();
    if(!ok){

      return false;

    await persistCurrent();

  function getStoredBankInfo(){
    try{
      const raw = JSON.parse(localStorage.getItem('documentos_rey_bank_info_v1') || 'null');
      return raw && typeof raw === 'object' ? raw : {};
    }catch(_){
      return {};
    }
  }

  function saveStoredBankInfo(){
    try{
      const l2 = String(state && state.accountLine2 || '').trim();
      const l3 = String(state && state.accountLine3 || '').trim();
      if(!l2 && !l3) return;
      localStorage.setItem('documentos_rey_bank_info_v1', JSON.stringify({
        accountLine2: l2,
        accountLine3: l3
      }));
    }catch(_){}
  }

  function collectExactBankLines(obj, out, depth){
    if(!obj || depth > 5) return;
    if(Array.isArray(obj)){
      obj.forEach(function(v){ collectExactBankLines(v, out, (depth || 0) + 1); });
      return;
    }
    if(typeof obj !== 'object') return;

    ['accountLine2','accountLine3'].forEach(function(k){
      const line = String(obj[k] || '').trim();
      if(line && !out.includes(line)) out.push(line);
    });

    Object.keys(obj).forEach(function(k){
      const v = obj[k];
      if(v && typeof v === 'object') collectExactBankLines(v, out, (depth || 0) + 1);
    });
  }

  function getFacturaPaymentLines(){
    const out = [];

    collectExactBankLines(state, out, 0);
    if(out.length) return out;

    collectExactBankLines(getStoredBankInfo(), out, 0);
    if(out.length) return out;

    try{
      collectExactBankLines(JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null'), out, 0);
      if(out.length) return out;
    }catch(_){}

    try{
      collectExactBankLines(JSON.parse(localStorage.getItem(SAVE_LIST_KEY) || '[]'), out, 0);
      if(out.length) return out;
    }catch(_){}

    try{
      collectExactBankLines(JSON.parse(localStorage.getItem('rey_presu_history') || '[]'), out, 0);
      if(out.length) return out;
    }catch(_){}
    try{
      collectExactBankLines(JSON.parse(localStorage.getItem(FACTURACION_BRIDGE_KEY) || 'null'), out, 0);
      if(out.length) return out;
    }catch(_){}
    try{
      collectExactBankLines(JSON.parse(localStorage.getItem(PRESUPUESTO_VISUAL_BRIDGE_KEY) || 'null'), out, 0);
      if(out.length) return out;
    }catch(_){}

    return out;
  }

    // v2.86.01: guardamos el concepto destino por duplicado.
    // sessionStorage funciona en local; localStorage ayuda si Safari/iPhone recrea el iframe.
    try{ sessionStorage.setItem(DESIGN_RETURN_INDEX_KEY, String(safeIndex)); }catch(_){}
    try{ localStorage.setItem(DESIGN_RETURN_INDEX_KEY, String(safeIndex)); }catch(_){}

    const targetUrl = DESIGN_APP_URL + '?from_budget=1';

    try{
      if(window.parent && window.parent !== window && typeof window.parent.abrir === 'function'){

    try{ if(!img) img = localStorage.getItem(DESIGN_RETURN_IMG_KEY) || ''; }catch(_){}

    try{ idxRaw = sessionStorage.getItem(DESIGN_RETURN_INDEX_KEY); }catch(_){}
    try{ if(idxRaw == null) idxRaw = localStorage.getItem(DESIGN_RETURN_INDEX_KEY); }catch(_){}

    if(!img || idxRaw == null) return;

    const ok = await applyDesignImageToConcept(img, idxRaw);

    if(ok){
      try{ sessionStorage.removeItem(DESIGN_RETURN_IMG_KEY); }catch(_){}
      try{ sessionStorage.removeItem(DESIGN_RETURN_INDEX_KEY); }catch(_){}
      try{ localStorage.removeItem(DESIGN_RETURN_IMG_KEY); }catch(_){}

    }
  }

      applyDesignImageToConcept(img, idx).then(function(ok){
        if(ok){
          try{ sessionStorage.removeItem(DESIGN_RETURN_IMG_KEY); }catch(_){}
          try{ sessionStorage.removeItem(DESIGN_RETURN_INDEX_KEY); }catch(_){}
          try{ localStorage.removeItem(DESIGN_RETURN_IMG_KEY); }catch(_){}

  async function applyEdit(){
    if(!currentEdit) return closeSheet();
    if(currentEdit.type === 'company'){
      state.empresaNombre = $('editEmpresaNombre').value;
      state.empresaLine1 = $('editEmpresaLine1').value;
      state.empresaLine2 = $('editEmpresaLine2').value;
      state.empresaLine3 = $('editEmpresaLine3').value;
      state.empresaLine4 = ($('editEmpresaLine4') && $('editEmpresaLine4').value) ? $('editEmpresaLine4').value : '';
    } else if(currentEdit.type === 'client'){
      state.clienteNombre = $('editClienteNombre').value;
      state.clienteTelefono = $('editClienteTelefono').value;
      state.clienteDireccion = $('editClienteDireccion').value;
      state.clientePoblacion = $('editClientePoblacion').value;
      state.clienteProvincia = $('editClienteProvincia').value;
      state.clienteNif = $('editClienteNif').value;
    } else if(currentEdit.type === 'fecha') {
      state.fecha = $('editFecha').value || today();
      syncFacturaVencimientoDefault();
    } else if(currentEdit.type === 'numero') {
      state.numero = String(($('editNumero').value || '').trim() || await getNextBudgetNumber(currentBudgetYear())).toUpperCase();
    } else if(currentEdit.type === 'validez') {
      if(isFacturaDocument()){
        state.validez = $('editValidez').value || (state.fecha || today());
        state.facturaVencimientoManual = true;
      }else{
        state.validez = $('editValidez').value || addDays(state.fecha,15);
      }
    } else if(currentEdit.type === 'providerLogo') {
      const presetValue = $('editProviderLogoPreset').value || 'cortizo';
      state.providerLogoEnabled = presetValue === 'none' ? false : !!$('editProviderLogoEnabled').checked;
      state.providerLogoPreset = presetValue === 'none' ? 'cortizo' : presetValue;
    } else if(currentEdit.type === 'accountInfo') {
      state.accountEnabled = !!$('editAccountEnabled').checked;
      state.accountLine2 = $('editAccountLine2').value || '';
      state.accountLine3 = $('editAccountLine3').value || '';
      saveStoredBankInfo();
    } else if(currentEdit.type === 'legalText') {
      state.textoLegal = $('editLegalText').value || defaultLegalText();
      syncPagosFromLegalText();
    } else if(currentEdit.type === 'pagos') {
      const p1 = Math.max(0, Math.min(100, Number($('editPago1Percent').value || 0)));
      const p2 = Math.max(0, 100 - p1);
      state.pago1Label = String(($('editPago1Label').value || '').trim() || 'Entrega');
      state.pago2Label = String(($('editPago2Label').value || '').trim() || 'Resto');
      state.pago1Percent = String(p1);
      state.pago2Percent = String(p2);
      syncLegalTextFromPago1Percent(p1);
    } else if(currentEdit.type === 'conceptText') {
      state.items[currentEdit.index].text = $('editConceptText').value;
    } else if(currentEdit.type === 'simpleLine') {
      const it = state.items[currentEdit.index] || blankConcept(conceptCodeForIndex(currentEdit.index));
      it.code = it.code || conceptCodeForIndex(currentEdit.index);
      it.text = $('editSimpleText').value || '';
      it.units = String(($('editSimpleUnits').value || '1').replace(',','.'));
      it.price = String(($('editSimplePrice').value || '0').replace(',','.'));
      const d = String(($('editSimpleDiscount').value || '').replace(',','.')).trim();
      if(d) it.discount = d; else delete it.discount;
      it.image = '';
      while(state.items.length < currentEdit.index) state.items.push(blankConcept(conceptCodeForIndex(state.items.length)));
      state.items[currentEdit.index] = it;
    } else if(currentEdit.type === 'conceptMeta') {
      state.items[currentEdit.index].units = $('editUnits').value || '1';
      state.items[currentEdit.index].price = String(($('editPrice').value || '0').replace(',','.'));
      const d = String(($('editDiscount').value || '').replace(',','.')).trim();
      if(d) state.items[currentEdit.index].discount = d; else delete state.items[currentEdit.index].discount;
    } else if(currentEdit.type === 'catalogForm') {
      await loadProducts();
      const idx = productEditIndex == null ? -1 : Number(productEditIndex);
      const prev = idx >= 0 && idx < savedProducts.length ? savedProducts[idx] : null;
      const p = {
        id: String(prev && prev.id ? prev.id : ('pro_' + Date.now() + '_' + Math.random().toString(36).slice(2,7))),
        nombre: String($('editProductName').value || '').trim(),
        precio: Math.max(0, Number(String($('editProductPrice').value || '0').replace(',','.')) || 0),
        stock: Math.max(0, Number($('editProductStock').value || '0') || 0),
        imgThumb: String(productImageDraft || ''),
        imgFull: String(productImageDraft || '')
      };
      if(!p.nombre){
        toast('Pon un nombre de producto');
        return;
      }
      if(idx >= 0 && idx < savedProducts.length) savedProducts[idx] = p;
      else savedProducts.push(p);
      await saveProducts();
      await loadProducts();
      productEditIndex = null;
      productImageDraft = '';
      openEdit('catalog', 'Catálogo compartido');
      toast('Producto guardado');
      return;
    } else if(currentEdit.type === 'clientForm') {
      const idx = currentEdit.index == null ? -1 : Number(currentEdit.index);
      const prevClient = idx >= 0 && idx < savedClients.length ? savedClients[idx] : null;
      const c = {
        id: String(prevClient && prevClient.id ? prevClient.id : ('cli_' + Date.now() + '_' + Math.random().toString(36).slice(2,7))),
        nombre: String($('editSavedClientNombre').value || '').trim(),
        telefono: String($('editSavedClientTelefono').value || '').trim(),
        direccion: String($('editSavedClientDireccion').value || '').trim(),
        poblacion: String($('editSavedClientPoblacion').value || '').trim(),
        provincia: String($('editSavedClientProvincia').value || '').trim(),
        nif: String($('editSavedClientNif').value || '').trim()
      };
      if(!clientHasData(c)){
        toast('Rellena algún dato');
        return;
      }
      if(idx >= 0 && idx < savedClients.length){
        savedClients[idx] = c;
      }else{
        savedClients.push(c);
      }
      await saveClients();
      openEdit('clients', 'Lista de clientes');
      toast('Cliente guardado');
      return;
    } else if(currentEdit.type === 'templateForm') {
      const idx = currentEdit.index == null ? -1 : Number(currentEdit.index);
      const tpl = {
        name: String(($('editTemplateName').value || '').trim() || 'Sin título'),
        category: String(($('editTemplateCategory').value || '').trim() || 'General'),
        text: String($('editTemplateText').value || '')
      };
      if(idx >= 0 && idx < conceptTemplates.length){
        conceptTemplates[idx] = tpl;
      }else{
        conceptTemplates.push(tpl);
      }
      await saveConceptTemplates();
      openEdit('templates', 'Editar plantillas');
      toast('Plantilla guardada');
      return;
    } else if(currentEdit.type === 'style') {
      state.style = Object.assign(defaultStyle(), state.style || {}, {
        conceptHeaderFill: $('styleConceptHeaderFill').value || defaultStyle().conceptHeaderFill,
        conceptLineColor: $('styleConceptLineColor').value || defaultStyle().conceptLineColor,
        totalsHeaderFill: $('styleTotalsHeaderFill').value || defaultStyle().totalsHeaderFill,
        lineColor: $('styleLineColor').value || defaultStyle().lineColor,
        titleColor: $('styleTitleColor').value || defaultStyle().titleColor,
        companyColor: $('styleCompanyColor').value || defaultStyle().companyColor,
        textColor: $('styleTextColor').value || defaultStyle().textColor,
        lineWidth: $('styleLineWidth').value || defaultStyle().lineWidth,
        conceptLineWidth: $('styleConceptLineWidth').value || defaultStyle().conceptLineWidth,
        generalTextSize: $('styleGeneralTextSize').value || defaultStyle().generalTextSize,
        clientTextSize: $('styleClientTextSize').value || defaultStyle().clientTextSize,
        textYOffset: $('styleTextYOffset').value || defaultStyle().textYOffset,
        titleYOffset: $('styleTitleYOffset').value || defaultStyle().titleYOffset,
        dateYOffset: $('styleDateYOffset').value || defaultStyle().dateYOffset,
        numberYOffset: $('styleNumberYOffset').value || defaultStyle().numberYOffset,
        conceptYOffset: $('styleConceptYOffset').value || defaultStyle().conceptYOffset,
        conceptZoneStretch: $('styleConceptZoneStretch').value || defaultStyle().conceptZoneStretch,
        clientLineSpacing: $('styleClientLineSpacing').value || defaultStyle().clientLineSpacing,
        clientYOffset: $('styleClientYOffset').value || defaultStyle().clientYOffset,
        clientYOffset: $('styleClientYOffset').value || defaultStyle().clientYOffset,
        companyLineSpacing: $('styleCompanyLineSpacing').value || defaultStyle().companyLineSpacing,
        companyYOffset: $('styleCompanyYOffset').value || defaultStyle().companyYOffset,
        conceptTextSize: $('styleConceptTextSize').value || defaultStyle().conceptTextSize,
        conceptLineSpacing: $('styleConceptLineSpacing').value || defaultStyle().conceptLineSpacing,
        conceptMetaHeaderSize: $('styleConceptMetaHeaderSize').value || defaultStyle().conceptMetaHeaderSize,
        conceptMetaValueSize: $('styleConceptMetaValueSize').value || defaultStyle().conceptMetaValueSize,
        conceptCodeSize: $('styleConceptCodeSize').value || defaultStyle().conceptCodeSize,
        budgetNumberSize: $('styleBudgetNumberSize').value || defaultStyle().budgetNumberSize,
        budgetTitleSize: $('styleBudgetTitleSize').value || defaultStyle().budgetTitleSize,
        legalTextSize: $('styleLegalTextSize').value || defaultStyle().legalTextSize,
        legalLineSpacing: $('styleLegalLineSpacing').value || defaultStyle().legalLineSpacing,
        legalYOffset: $('styleLegalYOffset').value || defaultStyle().legalYOffset,
        pagosTextSize: $('stylePagosTextSize').value || defaultStyle().pagosTextSize,
        accountTextSize: $('styleAccountTextSize').value || defaultStyle().accountTextSize,
        footerTotalSize: $('styleFooterTotalSize').value || defaultStyle().footerTotalSize
      });
    }
    applyZoom();
    await render();
    if(currentEdit.type === 'style') toast('Estilo guardado');
    closeSheet();
  }

  $('btnClear').addEventListener('click', async function(){
    hideReturnAppButton();

    const texto = prompt('⚠️ ELIMINAR TODOS LOS DOCUMENTOS\n\nSe hará una copia automática antes de borrar.\nPara confirmar escribe exactamente: BORRAR TODO');
    if(texto !== 'BORRAR TODO'){
      toast('Operación cancelada');
      return;
    }

    const current = await loadSavedList();
    try{
      await storageSetJSON('backup_documentos_antes_borrado_total_' + Date.now(), current);
      try{ localStorage.setItem('backup_documentos_antes_borrado_total_' + Date.now(), JSON.stringify(current)); }catch(_){}
    }catch(_){}

    closeSettings();
    await storageRemove(STORAGE_KEY);
    await storageRemove(SAVE_LIST_KEY);

  function mergeDocumentoListas(localList, backupList){
    localList = Array.isArray(localList) ? localList : [];
    backupList = Array.isArray(backupList) ? backupList : [];

    function cleanText(v){
      return String(v == null ? '' : v).trim().toLowerCase();
    }

    function keyOf(doc, idx){
      doc = doc || {};
      return [
        cleanText(doc.documentId || doc.id || doc.uid),
        cleanText(doc.documentoTipo || doc.tipo || 'presupuesto'),
        cleanText(doc.numero || doc.num || ''),
        cleanText(doc.clienteNombre || doc.cliente || doc.nombreCliente || ''),
        cleanText(doc.fecha || doc.fechaEmision || '')
      ].join('|') || ('idx_' + idx);
    }

    function timeOf(doc){
      doc = doc || {};
      const raw = doc.updatedAt || doc.modifiedAt || doc.savedAt || doc.createdAt || doc.fechaGuardado || doc.fecha || 0;
      const n = Number(raw);
      if(isFinite(n) && n > 0) return n;
      const d = Date.parse(String(raw || ''));
      return isNaN(d) ? 0 : d;
    }

    const map = new Map();

    localList.forEach(function(doc, idx){
      if(doc && typeof doc === 'object') map.set(keyOf(doc, idx), doc);
    });

    backupList.forEach(function(doc, idx){
      if(!doc || typeof doc !== 'object') return;
      const k = keyOf(doc, idx);
      const current = map.get(k);
      if(!current){
        map.set(k, doc);
        return;
      }
      const incomingTime = timeOf(doc);
      const currentTime = timeOf(current);
      if(incomingTime && incomingTime > currentTime){
        map.set(k, doc);
      }
    });

    return Array.from(map.values());
  }

  $('fileImportAll').addEventListener('change', async function(e){
    const file = e.target.files && e.target.files[0];
    if(!file) return;
    try{
      const txt = await file.text();
      const parsed = JSON.parse(txt);

      const currentListBeforeRestore = await loadSavedList();

      // Copia interna de seguridad antes de restaurar
      try{
        const safety = {
          app:'Documentos Rey',
          version:'v2.86.01',
          timestamp:new Date().toISOString(),
          current:state,
          all:currentListBeforeRestore
        };
        localStorage.setItem('documentos_rey_backup_antes_restore_' + Date.now(), JSON.stringify(safety));
      }catch(_){}

      let restoredCount = 0;
      let finalList = currentListBeforeRestore;

      if(parsed && Array.isArray(parsed.all)){
        finalList = mergeDocumentoListas(currentListBeforeRestore, parsed.all);
        await storageSetJSON(SAVE_LIST_KEY, finalList);
        restoredCount = finalList.length;
      }

      if(parsed && parsed.current){
        const normalizedCurrent = normalizeLoadedState(parsed.current);
        const currentKey = mergeDocumentoListas([], [normalizedCurrent])[0];
        const alreadyExists = finalList.some(function(d, i){
          return mergeDocumentoListas([d], [currentKey]).length === 1;
        });

        // Si el documento actual del backup no existe en la lista, también se añade.
        if(!alreadyExists && normalizedCurrent){
          finalList.push(normalizedCurrent);
          await storageSetJSON(SAVE_LIST_KEY, finalList);
        }

        // Se carga en pantalla el documento actual del backup, pero la lista queda mezclada.
        state = normalizedCurrent;
        await persistCurrent();
      }

      render();
      toast('Copia restaurada y mezclada: ' + (restoredCount || finalList.length) + ' documentos');
    }catch(_){
      toast('Archivo no válido');
    }
    e.target.value='';
  }, false);
