<style>

{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}.switch button{background:#e8eef5;color:#111}.switch button.active{background:#111;color:white}.checks{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}.checkrow{display:flex;align-items:center;gap:9px;background:#f3f6f9;border-radius:12px;padding:12px;font-weight:950}.checkrow input{width:24px;height:24px;accent-color:#111}.hidden{display:none}.canvasBox{overflow:hidden}.svgWrap{width:100%;max-width:900px;margin:auto;overflow:hidden;display:flex;justify-content:center;align-items:center;background:white;border:1px solid #dfe6ee;border-radius:14px}#svgWrap svg{width:100%;height:auto;display:block}.result{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}@media(min-width:760px){.result{grid-template-columns:repeat(5,1fr)}}.kpi{background:#eef6ea;border:1px solid #d8ead2;border-radius:14px;padding:11px;text-align:center}.kpi b{display:block;font-size:12px;color:#4d5b68}.kpi span{font-size:22px;font-weight:950}.total{background:var(--green2)}.mid{background:#fff3bd}.bad{background:#ffd1d1}.legend{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.tag{font-size:14px;font-weight:950;padding:9px 11px;border-radius:10px}.lg70{background:#bbb}.lg30{background:#8fb3e8}.lgova{background:#555;color:#fff}.lgpas{background:#ddd}.lganc{background:#f5d56a}
.fabricacion{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px}.fabBox{border:1px solid #d9e2ec;border-radius:12px;background:#f8fafc;padding:10px}.fabBox b{display:block;color:#667085;font-size:12px}.fabBox span{display:block;font-size:22px;font-weight:950}.fabTitle{font-size:18px;font-weight:950;margin:10px 0 8px}.markNote{font-size:13px;color:#667085;font-weight:850;margin:6px 0 10px}.marktable th{font-size:13px}.marktable td{font-size:15px}.marktable .num{background:#eaf7ff}.marktable .cen{background:#fff3bd}.marktable .edge{background:#d8ffff}@media(min-width:760px){.fabricacion{grid-template-columns:repeat(6,1fr)}}
table{width:100%;border-collapse:collapse;font-size:14px}th{background:var(--red);color:var(--gold);padding:7px}td{border:1px solid #9aa7b5;padding:6px;text-align:center;font-weight:850}.left{text-align:left}textarea{width:100%;min-height:105px;border:1px solid #ccd3dc;border-radius:12px;padding:10px;font-size:15px}.pngModal{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:99;display:none;align-items:center;justify-content:center;padding:18px}.pngModal.show{display:flex}.pngCard{background:#fff;border-radius:18px;max-width:960px;width:100%;max-height:92vh;overflow:auto;padding:14px;box-shadow:0 10px 30px #0008}.pngCard h2{margin:0 0 6px;font-size:20px}.pngCard p{margin:6px 0 10px;color:#667085;font-weight:800}.pngCard img{display:block;width:100%;height:auto;border:1px solid #d9e2ec;border-radius:12px;background:#fff}.pngActions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.pngActions a{display:inline-block;text-decoration:none;border-radius:11px;padding:11px 12px;font-size:15px;font-weight:900;background:#009d38;color:#fff}.fold summary{font-size:17px;font-weight:950;cursor:pointer}.fold{margin-bottom:12px}.cost td:first-child{text-align:left;background:#dcefd6}.cost td:last-child{background:#c2ddb4}.cost.total td:last-child{background:#20ef29}.compactDetails summary{font-size:18px;font-weight:950;cursor:pointer}.compactDetails{margin-bottom:12px}.actionsRow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.actionsRow button{width:100%}.actionsRow3{grid-template-columns:1.15fr .85fr 1.15fr}.actionsRow3 button{min-height:52px;padding:10px 6px;font-size:15px;line-height:1.05}@media(max-width:390px){.actionsRow3{gap:6px}.actionsRow3 button{font-size:13px;padding:9px 4px;min-height:48px}}@media(max-width:430px){.wrap{padding:10px}.card{padding:12px}.inputs{gap:8px}.btns button{min-width:110px}.tag{font-size:13px;padding:8px 10px}input,select{font-size:19px}}

.card.dato{padding:12px}.card.dato .title{margin-bottom:8px}.card.dato .inputs{gap:8px}.card.dato label{font-size:11px;margin-bottom:4px}.card.dato input,.card.dato select{font-size:19px;padding:10px;border-radius:11px}.card.dato .checks{gap:8px;margin-top:8px}.card.dato .checkrow{padding:9px 10px;font-size:15px}.card.dato .checkrow input{width:22px;height:22px}.card.dato .hint{margin:7px 0 4px}.card.dato .actionsRow{margin-top:10px}.card.dato .actionsRow button{padding:12px 10px}.datoRow{display:grid;grid-template-columns:1fr 1fr;gap:8px}.autoRow{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}@media(max-width:390px){.card.dato input,.card.dato select{font-size:18px;padding:9px}.card.dato .checkrow{font-size:14px}.card.dato .title{font-size:17px}}

.card.dato{padding:11px 12px}.card.dato .title{font-size:17px;margin:0 0 8px}.main4{display:grid;grid-template-columns:1.1fr .9fr .7fr .85fr 1.15fr;gap:7px;align-items:end}.main4 label,.postGrid label{font-size:10px;line-height:1.05;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.main4 label{text-align:center;display:block}.main4 input{font-size:18px;padding:9px 8px;border-radius:10px}.main4 .short input{text-align:center}.postGrid{display:grid;grid-template-columns:.72fr 1.08fr .72fr 1.08fr;gap:7px;margin-top:8px;align-items:end}.postToggle{height:45px;border-radius:10px;background:#f3f6f9;border:1px solid #e4ebf2;display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px;font-weight:950;color:#111;padding:0 5px;white-space:nowrap}.postToggle input{width:22px;height:22px;accent-color:#111;margin:0}.postGrid select{font-size:16px;padding:9px 6px;border-radius:10px}.card.dato .hint{font-size:11px;margin:7px 0 2px;line-height:1.2}.card.dato .actionsRow{margin-top:10px}.card.dato .actionsRow button{padding:11px 8px;border-radius:12px}@media(max-width:390px){.main4{gap:5px;grid-template-columns:1fr .82fr .62fr .78fr 1fr}.main4 label,.postGrid label{font-size:9px}.main4 input{font-size:16px;padding:8px 5px}.postGrid{gap:5px;grid-template-columns:.7fr 1.1fr .7fr 1.1fr}.postToggle{font-size:12px;height:42px}.postToggle input{width:20px;height:20px}.postGrid select{font-size:14px;padding:8px 4px}}

/* v5.4: tarjeta de datos más limpia */
.card.dato{padding-top:12px}

.postChip{height:44px;border-radius:12px;background:#111;color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:950;border:1px solid #111;box-shadow:inset 0 0 0 1px #0001}

.entryBox input{height:48px;font-size:18px;padding:8px;border-radius:12px;background:var(--edit);border-color:#e0c94d;text-align:center}
@media(max-width:390px){.endGrid{grid-template-columns:.75fr 1.25fr .75fr 1.25fr;gap:5px}.postChip{height:44px;font-size:15px}.entryBox label{font-size:9px}.entryBox input{height:44px;font-size:16px;padding:7px 4px}}

/* v6.3: fabricación tipo Excel con marcas de centros e inicio/final */
.endGrid{grid-template-columns:1fr 1fr .92fr .92fr;gap:8px;align-items:end}
.entryBox label{font-size:11px}
.postChip{height:48px;background:#00a33b;color:#fff;border-color:#008c33}

.legend{display:none!important}
@media(max-width:390px){.endGrid{grid-template-columns:1fr 1fr .88fr .88fr;gap:5px}.postChip{font-size:13px}.entryBox input{font-size:16px}}

.endGrid{grid-template-columns:1fr 1fr!important;gap:8px!important;align-items:end!important}

header{gap:8px}.backMenuBtn+h1{flex:1}

<body>
<header><button class="backMenuBtn" id="btnVolverIndex" type="button">← Menú</button><h1>Pasamanos</h1><div class="headRight"><button class="gearBtn" id="toggleAjustes">⚙️</button><span class="ver">v1.9</span></div></header>
<div class="pngModal" id="pngModal"><div class="pngCard"><h2>PNG generado</h2><p>En iPhone, mantén pulsada la imagen y pulsa “Guardar en Fotos”. También puedes usar Descargar si el navegador lo permite.</p><img id="pngPreview" alt="Pasamanos PNG"><div class="pngActions"><a id="pngDownload" download="pasamanos.png">Descargar PNG</a><button id="cerrarPng">Cerrar</button></div></div></div>

<div class="wrap">
<section class="card dato">
  <div class="main4">
    <div><label>Largo</label><input id="largo" inputmode="numeric" type="number" value="1500"></div>
    <div class="short"><label>Alto</label><input id="alto" inputmode="numeric" type="number" value="940"></div>
    <div class="short"><label>Grados</label><input id="grados" inputmode="numeric" type="number" value="0"></div>
    <div class="short"><label>Ovalados</label><input id="ovaladosManual" inputmode="numeric" type="number" value="0"></div>
    <div class="short"><label>Intermedios</label><input id="interManual" inputmode="numeric" type="number" value="0"></div>
  </div>
  <div class="endGrid">
    <div class="sideBox"><label>Izquierda</label><select id="ladoIzq">
      <option value="poste">Poste 70×70</option>
      <option value="compartido">Poste compartido</option>
      <option value="empotrado">Pared empotrado</option>
      <option value="angulo">Pared ángulo</option>
    </select></div>
    <div class="sideBox"><label>Derecha</label><select id="ladoDer">
      <option value="poste">Poste 70×70</option>
      <option value="compartido">Poste compartido</option>
      <option value="empotrado">Pared empotrado</option>
      <option value="angulo">Pared ángulo</option>
    </select></div>
  </div>
</section>
<section class="card canvasBox">
  <p class="title">Gráfico</p>
  <div id="svgWrap" class="svgWrap"></div>
  <div class="actionsRow actionsRow3"><button class="ok" id="pngHD">PNG HD</button><button class="light" id="pngNormal">PNG</button><button class="docsBtn" id="btnAddDocs">Añadir Docs</button></div>
</section>
<section class="card"><p class="title">Resultado</p><div id="kpis" class="result"></div></section>
<section class="card hidden" id="ajustesBox">
  <p class="title">Ajustes</p>
  <details class="fold" open><summary>Fabricación</summary><div class="inputs" style="margin-top:10px">
    <div><label>Ovalado corte mm</label><input id="hOva" type="number" value="740"></div><div><label>Pata suelo mm</label><input id="hPata" type="number" value="50"></div>
    <div><label>Anclaje inferior alto mm</label><input id="hAncInf" type="number" value="25"></div><div><label>Anclaje superior alto mm</label><input id="hAncSup" type="number" value="25"></div>
    <div><label>Pasamanos alto mm</label><input id="hPas" type="number" value="50"></div><div><label>Extra bola mm</label><input id="hBola" type="number" value="50"></div>
    <div><label>Grosor ovalado mm</label><input id="gOva" type="number" value="17"></div><div><label>Hueco objetivo mm</label><input id="huecoObj" type="number" value="105"></div>
    <div><label>Intermedio cada máx. mm</label><input id="sep30" type="number" value="1300"></div><div><label>Separación mín/máx mm</label><input id="rangoHueco" type="text" value="100-110"></div>
  </div></details>
  <details class="fold"><summary>Perfiles</summary><div class="inputs" style="margin-top:10px">
    <div><label>Poste lateral ancho mm</label><input id="latW" type="number" value="70"></div><div><label>Poste lateral fondo mm</label><input id="latF" type="number" value="70"></div>
    <div><label>Intermedio ancho mm</label><input id="intW" type="number" value="30"></div><div><label>Intermedio fondo mm</label><input id="intF" type="number" value="30"></div>
  </div></details>
  <details class="fold"><summary>Precios</summary><div class="inputs" style="margin-top:10px">
    <div><label>Pasamanos €/m</label><input id="pPas" type="number" step="0.01" value="13.52"></div><div><label>Anclajes €/m</label><input id="pAnc" type="number" step="0.01" value="5.12"></div>
    <div><label>Poste lateral €/ud</label><input id="p70" type="number" step="0.01" value="18.51"></div><div><label>Intermedio €/ud</label><input id="p30" type="number" step="0.01" value="6.96"></div>
    <div><label>Ovalado €/ud</label><input id="pOva" type="number" step="0.01" value="3.86"></div><div><label>Accesorios €</label><input id="acc" type="number" step="0.01" value="50"></div>
    <div><label>Montaje €</label><input id="mont" type="number" step="0.01" value="200"></div><div><label>Margen %</label><input id="margen" type="number" value="40"></div>
    <div><label>IVA %</label><input id="iva" type="number" value="21"></div>
  </div></details>
  <div class="btns"><button class="ok" id="guardar">Guardar</button><button class="danger" id="reset">Reset</button></div>

<section class="card"><details class="compactDetails"><summary>Despiece y marcado</summary><div id="tabla" style="margin-top:10px"></div></details></section>

</div>
<script>
const $=id=>document.getElementById(id);const nf=(n,d=0)=>(Number(n)||0).toLocaleString('es-ES',{minimumFractionDigits:d,maximumFractionDigits:d});const eu=n=>(Number(n)||0).toLocaleString('es-ES',{style:'currency',currency:'EUR'});const val=id=>parseFloat($(id).value)||0;const ints=id=>parseInt($(id).value)||0;let tipo='recto';let autoOvalados=true,autoInter=true;
const ids=['largo','alto','grados','ovaladosManual','interManual','hOva','hPata','hAncInf','hAncSup','hPas','hBola','gOva','huecoObj','sep30','latW','latF','intW','intF','pPas','pAnc','p70','p30','pOva','acc','mont','margen','iva','rangoHueco','ladoIzq','ladoDer'];

function volverAlIndex(){
  try{
    if(window.parent && window.parent !== window && typeof window.parent.volverMenu === 'function'){
      window.parent.volverMenu();
      return false;
    }
  }catch(e){}
  try{
    if(window.parent && window.parent !== window){
      window.parent.postMessage({type:'volverMenu', action:'volverMenu', target:'index'}, '*');
      window.parent.postMessage('volverMenu', '*');
      return false;
    }
  }catch(e){}
  try{ window.location.href='index.html'; }catch(e){}
  return false;
}

function perfilLat(){return `${nf(val('latW'))}×${nf(val('latF'))}`}
function perfilInt(){return `${nf(val('intW'))}×${nf(val('intF'))}`}
function altoTerminado(){return Math.max(0, val('alto') - val('hBola'))}
function ovaladoCorte(){return Math.max(0, altoTerminado() - val('hPata') - val('hAncInf') - val('hAncSup') - val('hPas'))}
function lado(id){return $(id)?.value||'poste'}
function esPoste(id){return lado(id)==='poste'}
function descuentaLado(id){
  const t=lado(id);
  // Solo el poste propio está dentro de la medida total y descuenta para el reparto.
  // Poste compartido, pared empotrada y pared con ángulo NO modifican el reparto;
  // solo cambian la entrada/corte del anclaje.
  return t==='poste';
}
function entradaLado(id){
  // La entrada solo se usa para el corte de anclaje, nunca para repartir ovalados.
  const t=lado(id);
  return (t==='poste'||t==='compartido')?30:(t==='empotrado'?100:0);
}
function nombreLado(id){const t=lado(id);return t==='poste'?'Poste 70×70':t==='compartido'?'Compartido':t==='empotrado'?'Empotrado':'Ángulo'}
function save(){let data={tipo,autoOvalados,autoInter};ids.forEach(id=>{data[id]=$(id).value});

    <tr><td>${perfilLat()}</td><td>${c.postes70}</td><td>${nf(c.alto70)} mm</td></tr>
    <tr><td>${perfilInt()}</td><td>${c.t30}</td><td>${nf(c.alto)} mm</td></tr>
    <tr><td>Ovalados</td><td>${c.totalOva}</td><td>${nf(ovaladoCorte())} mm</td></tr>
    <tr><td>Anclaje superior</td><td>1</td><td>${nf(c.corteAnc)} mm</td></tr>
    <tr><td>Anclaje inferior</td><td>1</td><td>${nf(c.corteAnc)} mm</td></tr>
    <tr><td>Pasamanos/tapa</td><td>1</td><td>${nf(c.pasamanosCorte)} mm</td></tr>
  </table><br><table><tr class="cost"><td>Coste material</td><td>${eu(c.coste)}</td></tr><tr class="cost"><td>Montaje</td><td>${eu(c.mont)}</td></tr><tr class="cost"><td>Margen</td><td>${eu(c.margen)}</td></tr><tr class="cost"><td>Bruto</td><td>${eu(c.bruto)}</td></tr><tr class="cost"><td>IVA</td><td>${eu(c.iva)}</td></tr><tr class="cost total"><td>PVP</td><td>${eu(c.pvp)}</td></tr></table>`;
  $('tabla').innerHTML=html
}
function renderTexto(c){$('texto').value=`Pasamanos ${tipo==='pendiente'?'con pendiente de '+nf(c.grados)+'°':'recto'} de ${nf(c.largo)} mm. Altura terminada ${nf(c.alto)} mm. Incluye ${c.postes70} poste(s) ${perfilLat()}, ${c.t30} intermedio(s) ${perfilInt()} y ${c.totalOva} ovalados de ${nf(ovaladoCorte())} mm. PVP IVA incluido: ${eu(c.pvp)}`}

function docsTargetIndex(){
  try{
    const qs = new URLSearchParams(location.search || '');
    const t = qs.get('target') || qs.get('index') || qs.get('concept') || '';
    if(t !== '') return Number(t);
  }catch(e){}
  try{
    const t = sessionStorage.getItem('rey_docs_external_target_index_v1') || localStorage.getItem('rey_docs_external_target_index_v1') || '';
    if(t !== '') return Number(t);
  }catch(e){}
  return 0;
}
function openedFromDocumentos(){
  try{ const qs = new URLSearchParams(location.search || ''); if(String(qs.get('from')||'').toLowerCase()==='documentos') return true; }catch(e){}
  try{ return !!(sessionStorage.getItem('rey_docs_external_target_index_v1') || localStorage.getItem('rey_docs_external_target_index_v1')); }catch(e){}
  return false;
}
function volverADocumentos(){
  const url='documentos.html';
  try{
    if(window.parent && window.parent !== window && typeof window.parent.abrir === 'function'){
      window.parent.abrir(url);
      return false;
    }
  }catch(e){}
  try{ window.location.href=url; }catch(e){}
  return false;
}
async function enviarADocumentos(){
  try{ render(); }catch(e){}
  const c = calc();
  let img = '';
  try{ const png = await svgToPng(2); img = png && png.dataUrl ? png.dataUrl : ''; }catch(e){ img=''; }
  const descripcion = ($('texto') ? $('texto').value : '').trim() || `Pasamanos de ${nf(c.largo)} mm`;
  const producto = {
    proveedor: 'Pasamanos',
    marca: 'Pasamanos',
    origen: 'pasamanos',
    referencia: `PASAMANOS ${nf(c.largo)}x${nf(c.alto70)}`,
    codigo: `PASAMANOS ${nf(c.largo)}x${nf(c.alto70)}`,
    nombre: 'Pasamanos',
    descripcion: descripcion,
    texto: descripcion,
    cantidad: 1,
    units: 1,
    unidad: 'ud',
    precio: Number(c.bruto || 0).toFixed(2),
    price: Number(c.bruto || 0).toFixed(2),
    pvpIvaIncluido: Number(c.pvp || 0).toFixed(2),
    imagen: img,
    image: img,
    png: img,
    targetIndex: docsTargetIndex()
  };
  try{ sessionStorage.setItem('rey_docs_external_product_v1', JSON.stringify(producto)); }catch(e){}
  try{ localStorage.setItem('rey_docs_external_product_v1', JSON.stringify(producto)); }catch(e){}
  try{ sessionStorage.setItem('rey_docs_external_target_index_v1', String(producto.targetIndex)); }catch(e){}
  try{ localStorage.setItem('rey_docs_external_target_index_v1', String(producto.targetIndex)); }catch(e){}
  const url='documentos.html?externalProduct=1';
  try{ if(window.parent && window.parent !== window && typeof window.parent.abrir === 'function'){ window.parent.abrir(url); return; } }catch(e){}
  try{ window.location.href=url; }catch(e){}
}

async function svgToPng(scale=2){let svg=$('pasamanosSvg');if(!svg)return null;let data=new XMLSerializer().serializeToString(svg);let blob=new Blob([data],{type:'image/svg+xml;charset=utf-8'});let url=URL.createObjectURL(blob);try{let img=new Image();await new Promise((res,rej)=>{img.onload=res;img.onerror=rej;img.src=url});let canvas=document.createElement('canvas');canvas.width=900*scale;canvas.height=700*scale;let ctx=canvas.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.drawImage(img,0,0,canvas.width,canvas.height);return{blob:await new Promise(r=>canvas.toBlob(r,'image/png')),dataUrl:canvas.toDataURL('image/png')}}finally{URL.revokeObjectURL(url)}}
async function guardarPNG(scale=2){let r=await svgToPng(scale);if(!r)return;let filename='pasamanos_'+new Date().toISOString().slice(0,19).replace(/[-:T]/g,'')+(scale>1?'_HD':'')+'.png';let file=new File([r.blob],filename,{type:'image/png'});if(navigator.canShare&&navigator.canShare({files:[file]})){try{await navigator.share({files:[file],title:'Pasamanos'});return}catch(e){}}$('pngDownload').download=filename;$('pngDownload').href=r.dataUrl;$('pngPreview').src=r.dataUrl;$('pngModal').classList.add('show')}
const calcBtn=$('calcular');if(calcBtn)calcBtn.onclick=render;
$('toggleAjustes').onclick=()=>{
  const box=$('ajustesBox');
  const open=box.classList.toggle('hidden')===false;
  $('toggleAjustes').classList.toggle('active',open);
  if(open){setTimeout(()=>box.scrollIntoView({behavior:'smooth',block:'start'}),60)}
};
$('guardar').onclick=()=>{render();$('ajustesBox').classList.add('hidden');$('toggleAjustes').classList.remove('active');};$('reset').onclick=()=>{localStorage.removeItem('pasamanos_v16');location.reload()};$('pngHD').onclick=()=>guardarPNG(2);$('pngNormal').onclick=()=>guardarPNG(1);$('cerrarPng').onclick=()=>{$('pngModal').classList.remove('show');$('pngPreview').src=''};$('copiar').onclick=async()=>{try{await navigator.clipboard.writeText($('texto').value);$('copiar').textContent='Copiado';setTimeout(()=>$('copiar').textContent='Copiar texto',1200)}catch(e){$('texto').select();document.execCommand('copy')}};ids.forEach(id=>{let el=$(id);if(!el||id==='ovaladosManual'||id==='interManual')return;el.addEventListener('focus',()=>setTimeout(()=>{if(el.select)el.select()},0));el.addEventListener('change',render);el.addEventListener('keydown',e=>{if(e.key==='Enter')el.blur()})});
['ovaladosManual','interManual'].forEach(id=>{let el=$(id);el.addEventListener('focus',()=>setTimeout(()=>{if(el.select)el.select()},0));el.addEventListener('change',()=>{if(id==='ovaladosManual')autoOvalados=ints(id)<=0;if(id==='interManual')autoInter=ints(id)<=0;render()});el.addEventListener('keydown',e=>{if(e.key==='Enter')el.blur()})});
['ladoIzq','ladoDer'].forEach(id=>$(id).addEventListener('change',render));
if($('btnVolverIndex'))$('btnVolverIndex').onclick=function(ev){try{ev.preventDefault();ev.stopPropagation();}catch(e){} return volverAlIndex();};
if($('btnVolverIndex'))$('btnVolverIndex').addEventListener('touchend',function(ev){try{ev.preventDefault();ev.stopPropagation();}catch(e){} volverAlIndex();},{passive:false});
if($('btnAddDocs'))$('btnAddDocs').onclick=enviarADocumentos;
load();render();
</script>
