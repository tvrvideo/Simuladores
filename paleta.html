<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Generador colores v10</title>
    <style>
    :root{
        --primary: #e74c3c;
        --bg0: #050711;
        --bg1: #0a0f1c;
        --panel: rgba(255,255,255,0.06);
        --panel2: rgba(255,255,255,0.04);
        --border: rgba(255,255,255,0.10);
        --text: #eef3ff;
        --muted: rgba(238,243,255,.72);
        --shadow: 0 18px 44px rgba(0,0,0,.45);
        --radius: 16px;
        --radius2: 14px;
        --btnText: #ffffff;
    }

    body {
        touch-action: manipulation;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        margin: 0;
        padding: env(safe-area-inset-top) 10px env(safe-area-inset-bottom);
        background: radial-gradient(900px 520px at 20% 10%, rgba(114, 214, 255, .14), transparent 58%),
                    radial-gradient(800px 480px at 85% 20%, rgba(167, 139, 250, .12), transparent 60%),
                    linear-gradient(180deg, var(--bg0), var(--bg1));
        color: var(--text);
        overscroll-behavior: none;
        -webkit-font-smoothing: antialiased;
        -webkit-text-size-adjust: 100%;
    }

    .container {
        max-width: 420px;
        margin: 0 auto;
        padding: 18px;
        background: linear-gradient(180deg, var(--panel), var(--panel2));
        box-shadow: var(--shadow);
        border-radius: var(--radius);
        border: 1px solid var(--border);
        display: block;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
    }

    /* Estilos generales App principal */
    .app-title{
        text-align: center; font-size: 1.6em; margin: 52px 0 18px;
        letter-spacing: .2px; font-weight: 950; line-height: 1.1; color: var(--primary);
    }
    .app-title .ver{
        display: inline-block; font-size: .62em; font-weight: 900; color: var(--muted);
        margin-left: 8px; padding: 4px 8px; border-radius: 999px;
        border: 1px solid var(--border); background: rgba(0,0,0,.16); vertical-align: middle;
    }

    .btn-menu {
        position: fixed; top: calc(env(safe-area-inset-top) + 10px); left: 10px; z-index: 9999;
        padding: 9px 14px; border-radius: 999px; border: 1px solid rgba(255,255,255,.16);
        background: var(--primary); color: var(--text); font-weight: 900;
        box-shadow: 0 10px 22px rgba(0,0,0,.28); cursor: pointer; font-size: 0.9rem;
    }

    .btn-camera-launch {
        width: 100%; padding: 14px; background: linear-gradient(135deg, rgba(52,199,89,.95), rgba(52,199,89,.70));
        color: var(--btnText); border: 1px solid rgba(255,255,255,.14); border-radius: 14px;
        font-size: 1.05em; font-weight: 900; margin-bottom: 18px; cursor: pointer;
        display: flex; align-items: center; justify-content: center; gap: 10px;
        box-shadow: 0 16px 30px rgba(52,199,89,0.18);
    }
    .btn-camera-launch:active { transform: scale(0.985); }

    .color-picker-group {
        display: flex; align-items: center; justify-content: space-between;
        margin-bottom: 14px; padding: 14px; border: 1px solid var(--border);
        border-radius: var(--radius2); background: rgba(0,0,0,.10);
    }
    #colorWheelInput {
        width: 72px; height: 42px; border: none; padding: 0; border-radius: 10px;
        cursor: pointer; background: none; box-shadow: inset 0 0 0 1px rgba(255,255,255,.12);
    }
    .hex-display-input, input[type="text"] {
        flex-grow: 1; padding: 12px; border: 1px solid rgba(255,255,255,.16);
        border-radius: 12px; font-size: 16px; background: rgba(255,255,255,.07);
        color: var(--text); outline: none; width: 100%; box-sizing: border-box;
    }
    .hex-display-input { margin-left: 12px; text-transform: uppercase; }
    
    .selector-group { margin-bottom: 12px; position: relative; }
    label { display: block; margin-bottom: 7px; font-weight: 900; font-size: 0.9em; color: var(--muted); }

    .custom-select .select-selected {
        background: rgba(255,255,255,.07); padding: 12px;
        border: 1px solid rgba(255,255,255,.16); border-radius: 12px;
        cursor: pointer; display: flex; justify-content: space-between; align-items: center;
        color: var(--text); font-weight: 900;
    }

    #color-display {
        width: 100%; height: 120px; border: 1px solid rgba(255,255,255,.16);
        margin-top: 16px; border-radius: var(--radius2); display: flex;
        flex-direction: column; align-items: center; justify-content: center;
        font-size: 1.05em; font-weight: 900; color: #fff; text-shadow: 0 0 5px rgba(0,0,0,0.7);
        position: relative; overflow:hidden;
    }
    .code-info {
        margin: 6px 0; padding: 4px 10px; border-radius: 999px;
        background-color: rgba(0,0,0,0.22); backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px); position: relative; z-index: 1;
    }

    /* =========================
       NUEVO CSS: Panel de Cámara
       ========================= */
    #camera-app {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; z-index: 10000; flex-direction: column;
    }
    #viewport-container {
        position: relative; flex-grow: 1; width: 100%; overflow: hidden; background: #000;
    }
    video, #uploaded-image { width: 100%; height: 100%; object-fit: cover; display: block; }
    #uploaded-image { display: none; }

    #crosshair {
        position: absolute; top: 50%; left: 50%; width: 30px; height: 30px;
        border: 2px solid rgba(255,255,255,0.9); border-radius: 50%;
        transform: translate(-50%, -50%); pointer-events: none;
        box-shadow: 0 0 5px rgba(0,0,0,0.5);
    }
    #crosshair::after {
        content: ''; position: absolute; top: 50%; left: 50%; width: 4px; height: 4px;
        background: #ff3b30; transform: translate(-50%, -50%); border-radius: 50%;
    }
    #zoom-loupe {
        position: absolute; width: 120px; height: 120px; border-radius: 50%;
        border: 3px solid rgba(255,255,255,.95); box-shadow: 0 10px 24px rgba(0,0,0,0.45);
        overflow: hidden; pointer-events: none; transform: translate(-50%, -50%);
        background: #000; z-index: 10002; display: none;
    }
    #zoom-canvas { width: 100%; height: 100%; }

    /* CONTROLES CÁMARA REDISEÑADOS */
    #camera-controls {
        background: linear-gradient(180deg, rgba(14,22,48,.98), rgba(10,15,28,.98));
        border-top: 1px solid rgba(255,255,255,.10);
        padding: 16px;
        border-radius: 20px 20px 0 0;
        display: flex; flex-direction: column; gap: 14px;
        color: var(--text);
        padding-bottom: max(20px, env(safe-area-inset-bottom));
    }

    /* Fila comparativa */
    .compare-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
    }
    .compare-box {
        background: rgba(255,255,255,.06);
        border: 1px solid rgba(255,255,255,.10);
        border-radius: 12px;
        padding: 10px;
        display: flex; flex-direction: column; align-items: center;
        text-align: center;
    }
    .swatch-large {
        width: 100%; height: 36px; border-radius: 8px;
        margin-bottom: 8px; border: 1px solid rgba(255,255,255,.1);
        position: relative;
    }
    .lbl-sm { font-size: 0.75em; color: var(--muted); font-weight: 700; text-transform: uppercase; margin-bottom: 2px;}
    .lbl-val { font-family: monospace; font-size: 0.95em; color: #fff; font-weight: 800; }
    .lbl-name { font-size: 0.8em; color: var(--text); font-weight: 700; margin-top: 2px;
                white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%;}

    /* Título sección alternativas */
    .alt-title { font-size: 0.8em; color: var(--muted); font-weight: 900; margin-bottom: -6px; margin-left: 4px; }
    
    /* Scroll de alternativas */
    .alternatives-scroll {
        display: flex; gap: 10px; overflow-x: auto;
        padding-bottom: 4px;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
    }
    .alternatives-scroll::-webkit-scrollbar { display: none; }
    
    .alt-chip {
        flex: 0 0 auto;
        background: rgba(255,255,255,.06);
        border: 1px solid rgba(255,255,255,.10);
        border-radius: 10px;
        padding: 6px 10px;
        display: flex; align-items: center; gap: 8px;
        cursor: pointer;
        transition: background 0.2s, border-color 0.2s;
    }
    .alt-chip.active {
        background: rgba(52,199,89,.2);
        border-color: #34C759;
    }
    .alt-swatch { width: 24px; height: 24px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); }
    .alt-info { display: flex; flex-direction: column; }
    .alt-code { font-size: 0.85em; font-weight: 800; color: #fff; }
    .alt-dist { font-size: 0.7em; color: var(--muted); }

    .cam-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 4px; }
    .btn-cam {
        padding: 12px; border-radius: 14px;
        border: 1px solid rgba(255,255,255,.14);
        font-size: 16px; font-weight: 950; cursor: pointer;
        background: rgba(255,255,255,.08); color: var(--text);
    }
    .btn-confirm {
        background: linear-gradient(135deg, rgba(0,122,255,.95), rgba(167,139,250,.70));
        color: white; grid-column: span 2;
        box-shadow: 0 14px 26px rgba(0,122,255,.18);
    }
    .btn-close {
        position: absolute; top: calc(env(safe-area-inset-top) + 14px); right: 14px;
        background: rgba(0,0,0,0.55); color: white;
        border: 1px solid rgba(255,255,255,.14); padding: 9px 14px;
        border-radius: 999px; z-index: 10001; font-weight: 950;
    }

    /* Modal RAL */
    .ral-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 20000; display: none; }
    .ral-modal.show { display: flex; }
    .ral-sheet {
        width: 100%; height: 100%; background: linear-gradient(180deg, rgba(14,22,48,.98), rgba(10,15,28,.98));
        display: flex; flex-direction: column; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom);
        color: var(--text);
    }
    .ral-header { display: flex; align-items: center; justify-content: space-between; padding: 14px; border-bottom: 1px solid rgba(255,255,255,.10); }
    .ral-list { flex: 1; overflow-y: auto; padding: 10px; }
    .ral-item {
        display: flex; align-items: center; gap: 12px; padding: 12px; margin-bottom: 8px;
        border: 1px solid rgba(255,255,255,.10); border-radius: 14px; background: rgba(255,255,255,.06);
    }
    .ral-swatch { width: 34px; height: 34px; border-radius: 12px; }
    #ral-search { width: 100%; padding: 12px; border-radius: 12px; background: rgba(255,255,255,.07); color:#fff; border:1px solid rgba(255,255,255,.16); outline:none; }

    </style>
</head>
<body>

<button type="button" class="btn-menu" onclick="if(window.parent && window.parent.volverMenu){window.parent.volverMenu()}"><- MENÚ</button>

<div class="container" id="main-app">
    <h1 class="app-title">Generador de colores <span class="ver">v10</span></h1>

    <button type="button" class="btn-camera-launch" onclick="openGalleryDirect()">
         Seleccionar imagen
    </button>

    <div class="color-picker-group">
        <label for="colorWheelInput">1 Paleta colores</label>
        <input type="color" id="colorWheelInput" value="#36454F" oninput="selectColorFromWheel(this.value)">
        <input type="text" id="hexDisplay" class="hex-display-input" readonly value="#36454F" placeholder="#HEX">
    </div>

    <div class="selector-group">
        <label for="customRalSelector">2 Selecciona RAL</label>
        <div id="customRalSelector" class="custom-select">
            <div class="select-selected" data-ral="" data-hex="">Elige código RAL</div>
        </div>
    </div>

    <div class="selector-group">
        <label for="codeInput">3. Introducir RAL o HEX</label>
        <input type="text" id="codeInput" placeholder="Ej: 7016 o #CC0605" oninput="convertColorFromInput()">
    </div>

    <div id="color-display" style="background-color: #36454F;">
        <span class="code-info">RAL 7016 (Gris Antracita)</span>
        <span class="code-info">#36454F</span>
    </div>
</div>

<div id="camera-app">
    <button type="button" class="btn-close" onclick="closeCameraApp()">X Cerrar</button>

    <div id="viewport-container">
        <video id="video" autoplay muted playsinline></video>
        <img id="uploaded-image" alt="Imagen cargada">
        <div id="crosshair"></div>
        <div id="zoom-loupe"><canvas id="zoom-canvas"></canvas></div>
    </div>

    <div id="camera-controls">
        
        <div class="compare-row">
            <div class="compare-box">
                <div class="lbl-sm">Detectado</div>
                <div id="scan-swatch" class="swatch-large" style="background:#000;"></div>
                <div id="scan-hex" class="lbl-val">#000000</div>
            </div>
            
            <div class="compare-box" style="border-color: rgba(52,199,89,0.3);">
                <div class="lbl-sm" style="color:#34C759;">Sugerido</div>
                <div id="best-ral-swatch" class="swatch-large" style="background:#000;"></div>
                <div id="best-ral-code" class="lbl-val">RAL ---</div>
                <div id="best-ral-name" class="lbl-name">...</div>
            </div>
        </div>

        <div class="alt-title">Otras opciones cercanas:</div>
        <div class="alternatives-scroll" id="alternatives-list">
            </div>

        <div class="cam-actions">
            <button type="button" id="freeze-btn" class="btn-cam">Congelar</button>
            <label class="btn-cam" style="margin:0;">
                Galería
                <input type="file" id="file-upload" accept="image/*" style="display:none;">
            </label>
            <button type="button" id="confirm-color-btn" class="btn-cam btn-confirm">USAR ESTE COLOR</button>
        </div>
    </div>
    <canvas id="canvas" style="display:none;"></canvas>
</div>

<div id="ral-modal" class="ral-modal" aria-hidden="true">
  <div class="ral-sheet" role="dialog">
    <div class="ral-header">
      <button type="button" class="btn-cam" id="ral-close-btn" style="padding:8px 14px;">Cerrar</button>
      <div style="font-weight:900;">Lista RAL</div>
    </div>
    <div style="padding:10px;"><input id="ral-search" type="text" placeholder="Buscar RAL..." autocomplete="off"></div>
    <div class="ral-list" id="ral-list"></div>
  </div>
</div>

/* =========================
   UI PRINCIPAL
   ========================= */
function isLightColor(hex) {
    const c = hex.substring(1);
    const rgb = parseInt(c, 16);
    return (0.2126 * ((rgb >> 16) & 0xff) + 0.7152 * ((rgb >> 8) & 0xff) + 0.0722 * ((rgb >> 0) & 0xff)) > 180;
}

function getRalFromHex(hex) {
    const normalizedHex = hex.toUpperCase();
    for (const ral in ralToHexMap) {
        if (ralToHexMap[ral].hex.toUpperCase() === normalizedHex) return ral;
    }
    return null;
}

function displayColorInfo(ralCode, hexCode) {
    const displayElement = document.getElementById('color-display');
    let finalHex = hexCode.startsWith('#') ? hexCode : '#' + hexCode;
    displayElement.style.backgroundColor = finalHex;
    displayElement.style.color = isLightColor(finalHex) ? '#000' : '#fff';
    let ralInfoText = 'Color personalizado';
    if (ralCode && ralToHexMap[ralCode]) ralInfoText = `RAL ${ralCode} (${ralToHexMap[ralCode].name})`;
    else if (ralCode) ralInfoText = `RAL ${ralCode}`;
    displayElement.innerHTML = `<span class="code-info">${ralInfoText}</span><span class="code-info">${finalHex.toUpperCase()}</span>`;
}

function selectColorFromWheel(hexValue) {
    const finalHex = hexValue.toUpperCase();
    document.getElementById('hexDisplay').value = finalHex;
    document.getElementById('codeInput').value = '';
    const selectedDiv = document.querySelector('.custom-select .select-selected');
    selectedDiv.innerHTML = "Elige código RAL";
    selectedDiv.dataset.ral = "";
    displayColorInfo(getRalFromHex(finalHex), finalHex);
}

function convertColorFromInput() {
    let inputValue = document.getElementById('codeInput').value.trim().toUpperCase();
    let resultRal = null, resultHex = null;
    const selectedDiv = document.querySelector('.custom-select .select-selected');
    selectedDiv.innerHTML = "Elige código RAL";
    selectedDiv.dataset.ral = "";

    if (!inputValue) return;

    if (/^\d{4}$/.test(inputValue) && ralToHexMap[inputValue]) {
        resultRal = inputValue;
        resultHex = ralToHexMap[inputValue].hex;
        selectedDiv.innerHTML = `RAL ${resultRal} - ${ralToHexMap[resultRal].name}`;
        selectedDiv.dataset.ral = resultRal;
    } else {
        let tempHex = inputValue.startsWith('#') ? inputValue.substring(1) : inputValue;
        if (/[0-9A-F]{6}$/.test(tempHex) && tempHex.length === 6) {
            resultHex = `#${tempHex}`;
            resultRal = getRalFromHex(resultHex);
        } else if (/[0-9A-F]{3}$/.test(tempHex) && tempHex.length === 3) {
            resultHex = `#${tempHex[0]}${tempHex[0]}${tempHex[1]}${tempHex[1]}${tempHex[2]}${tempHex[2]}`;
            resultRal = getRalFromHex(resultHex);
        }
    }

    if (resultHex) {
        document.getElementById('hexDisplay').value = resultHex.toUpperCase();
        document.getElementById('colorWheelInput').value = resultHex;
        displayColorInfo(resultRal, resultHex);
    }
}

function initCustomSelect() {
    const customSelect = document.getElementById('customRalSelector');
    customSelect.querySelector('.select-selected').addEventListener('click', openRalModal);
    buildRalModalList();
}

function updateAppWithColor(ral, hex) {
    document.getElementById('hexDisplay').value = hex.toUpperCase();
    document.getElementById('colorWheelInput').value = hex;
    document.getElementById('codeInput').value = '';
    const selectedElement = document.querySelector('.custom-select .select-selected');
    if (ral && ralToHexMap[ral]) {
        selectedElement.innerHTML = `RAL ${ral} - ${ralToHexMap[ral].name}`;
        selectedElement.dataset.ral = ral;
    } else {
        selectedElement.innerHTML = "RAL personalizado";
        selectedElement.dataset.ral = "";
    }
    displayColorInfo(ral, hex);
}

/* =========================
   CÁMARA / DETECCIÓN
   ========================= */
let stream = null;
let isFrozen = false;
let camMode = 'camera';
let pickSX = 0, pickSY = 0;
let pickX = 0.5, pickY = 0.5;
let currentDetectedHex = "#000000";
let selectedRalForUse = null; // El que elegirá el usuario (puede ser el mejor o una alternativa)

const video = document.getElementById('video');
const imgElement = document.getElementById('uploaded-image');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
const crosshair = document.getElementById('crosshair');
const viewportContainer = document.getElementById('viewport-container');

function closeCameraApp() {
    if (stream) { try { stream.getTracks().forEach(track => track.stop()); } catch(_) {} stream = null; }
    document.getElementById('camera-app').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
}

function openGalleryDirect() {
    document.getElementById('main-app').style.display = 'none';
    document.getElementById('camera-app').style.display = 'flex';
    camMode = 'image'; isFrozen = true;
    if (stream) { try { stream.getTracks().forEach(t => t.stop()); } catch(_) {} stream = null; }
    video.style.display = 'none'; imgElement.style.display = 'block';
    document.getElementById('freeze-btn').style.display = 'none';
    const input = document.getElementById('file-upload'); input.value = ''; input.click();
}

function getCoverGeometry(sourceEl) {
    const rect = viewportContainer.getBoundingClientRect();
    const cw = rect.width, ch = rect.height;
    const sw = (sourceEl === video) ? (video.videoWidth||0) : (imgElement.naturalWidth||0);
    const sh = (sourceEl === video) ? (video.videoHeight||0) : (imgElement.naturalHeight||0);
    if (!sw||!sh||!cw||!ch) return null;
    const scale = Math.max(cw/sw, ch/sh);
    const dw = sw*scale, dh = sh*scale;
    const offsetX = (dw-cw)/2, offsetY = (dh-ch)/2;
    return { cw, ch, sw, sh, scale, dw, dh, offsetX, offsetY };
}

function sourceToContainerNorm(sourceEl, sx, sy) {
    const g = getCoverGeometry(sourceEl); if (!g) return null;
    const dx = sx * g.scale, dy = sy * g.scale;
    const cx = dx - g.offsetX, cy = dy - g.offsetY;
    return { nx: Math.max(0,Math.min(1,cx/g.cw)), ny: Math.max(0,Math.min(1,cy/g.ch)), g };
}

function setPickToCenter(sourceEl) {
    const sw = (sourceEl === video) ? (video.videoWidth||0) : (imgElement.naturalWidth||0);
    const sh = (sourceEl === video) ? (video.videoHeight||0) : (imgElement.naturalHeight||0);
    if (!sw||!sh) return;
    pickSX = Math.floor(sw/2); pickSY = Math.floor(sh/2);
    const back = sourceToContainerNorm(sourceEl, pickSX, pickSY);
    if (back) { pickX = back.nx; pickY = back.ny; }
    drawCrosshair();
}

function drawCrosshair() {
    crosshair.style.left = (pickX * 100) + '%';
    crosshair.style.top  = (pickY * 100) + '%';
}

function getTopRals(r, g, b, limit = 5) {
    const results = [];
    for (const ral in ralToHexMap) {
        const h = ralToHexMap[ral].hex;
        const cr = parseInt(h.substring(1,3), 16);
        const cg = parseInt(h.substring(3,5), 16);
        const cb = parseInt(h.substring(5,7), 16);
        const dist = Math.sqrt((r-cr)**2 + (g-cg)**2 + (b-cb)**2);
        results.push({ ral, dist, hex: h, name: ralToHexMap[ral].name });
    }
    results.sort((a,b) => a.dist - b.dist);
    return results.slice(0, limit);
}

// Renderiza la lista de alternativas
function renderAlternatives(topMatches) {
    const list = document.getElementById('alternatives-list');
    list.innerHTML = ''; // limpiar

    // Si el usuario no ha forzado una elección, seleccionamos la mejor coincidencia por defecto
    // Pero si el usuario toca una alternativa, esa será "selectedRalForUse"
    // Reiniciamos selección manual si estamos en modo "vivo" (video no congelado) para que siga al mejor
    if (camMode === 'camera' && !isFrozen) {
        selectedRalForUse = topMatches[0].ral;
    }

    topMatches.forEach((m, index) => {
        const isSelected = (m.ral === selectedRalForUse);
        const chip = document.createElement('div');
        chip.className = `alt-chip ${isSelected ? 'active' : ''}`;
        chip.innerHTML = `
            <div class="alt-swatch" style="background:${m.hex}"></div>
            <div class="alt-info">
                <div class="alt-code">RAL ${m.ral}</div>
                <div class="alt-dist">${m.name}</div>
            </div>
        `;
        chip.addEventListener('click', () => {
            selectedRalForUse = m.ral;
            updateComparisonPanel(currentDetectedHex, m);
            renderAlternatives(topMatches); // Re-render para actualizar estado 'active'
        });
        list.appendChild(chip);
    });
}

function updateComparisonPanel(detectedHex, ralData) {
    // Caja Detectado
    document.getElementById('scan-swatch').style.backgroundColor = detectedHex;
    document.getElementById('scan-hex').innerText = detectedHex;

    // Caja Sugerido / Seleccionado
    document.getElementById('best-ral-swatch').style.backgroundColor = ralData.hex;
    document.getElementById('best-ral-code').innerText = "RAL " + ralData.ral;
    document.getElementById('best-ral-name').innerText = ralData.name;
}

function analyzeFrame(sourceEl) {
    const sw = (sourceEl===video)?(video.videoWidth||0):(imgElement.naturalWidth||0);
    const sh = (sourceEl===video)?(video.videoHeight||0):(imgElement.naturalHeight||0);
    if (!sw||!sh) return;
    if (pickSX===0 && pickSY===0) setPickToCenter(sourceEl);

    pickSX = Math.max(0, Math.min(sw-1, Math.round(pickSX)));
    pickSY = Math.max(0, Math.min(sh-1, Math.round(pickSY)));

    canvas.width = sw; canvas.height = sh;
    ctx.drawImage(sourceEl, 0, 0, sw, sh);
    const p = ctx.getImageData(pickSX, pickSY, 1, 1).data;
    const r=p[0], gg=p[1], b=p[2];
    const hex = "#" + ((1<<24)+(r<<16)+(gg<<8)+b).toString(16).slice(1).toUpperCase();
    currentDetectedHex = hex;

    // Obtener los 5 mejores
    const topMatches = getTopRals(r, gg, b, 5);
    
    // Determinar cuál mostrar en la caja principal
    // Si selectedRalForUse está definido y existe en la lista de tops, mostramos ese.
    // Si no (o si cambio drásticamente la escena), mostramos el top 1.
    let activeMatch = topMatches[0];
    const userSelection = topMatches.find(m => m.ral === selectedRalForUse);
    if(userSelection) activeMatch = userSelection;
    else selectedRalForUse = topMatches[0].ral;

    updateComparisonPanel(hex, activeMatch);
    renderAlternatives(topMatches);

    // Zoom/Crosshair
    const back = sourceToContainerNorm(sourceEl, pickSX, pickSY);
    if(back){ pickX = back.nx; pickY = back.ny; }
    drawCrosshair();
    updateZoom(sourceEl);
    positionLoupe();
}

/* =========================
   DRAG & ZOOM
   ========================= */
let dragging=false, rafMove=0, pendingSX=0, pendingSY=0;
let lastClientX=0, lastClientY=0;

function scheduleAnalyze() {
    analyzeFrame(camMode === 'camera' ? video : imgElement);
}

function applyPendingMove() {
    rafMove=0;
    if(!dragging){ pendingSX=0; pendingSY=0; return; }
    const srcEl = (camMode === 'camera') ? video : imgElement;
    const g = getCoverGeometry(srcEl); if(!g) return;
    pickSX += pendingSX/g.scale; pickSY += pendingSY/g.scale;
    pendingSX=0; pendingSY=0;
    pickSX = Math.round(Math.max(0, Math.min(g.sw-1, pickSX)));
    pickSY = Math.round(Math.max(0, Math.min(g.sh-1, pickSY)));
    scheduleAnalyze();
}

viewportContainer.addEventListener('pointerdown', (e) => {
    e.preventDefault(); dragging=true;
    document.getElementById('zoom-loupe').style.display='block';
    try { viewportContainer.setPointerCapture(e.pointerId); } catch(_) {}
    lastClientX=e.clientX; lastClientY=e.clientY;
});
viewportContainer.addEventListener('pointermove', (e) => {
    if(!dragging) return; e.preventDefault();
    const dx = e.clientX-lastClientX; const dy = e.clientY-lastClientY;
    lastClientX=e.clientX; lastClientY=e.clientY;
    pendingSX+=dx; pendingSY+=dy;
    if(!rafMove) rafMove = requestAnimationFrame(applyPendingMove);
});
function endDrag() {
    dragging=false; pendingSX=0; pendingSY=0;
    if(rafMove){ cancelAnimationFrame(rafMove); rafMove=0; }
    document.getElementById('zoom-loupe').style.display='none';
}
viewportContainer.addEventListener('pointerup', endDrag);
viewportContainer.addEventListener('pointercancel', endDrag);

/* ZOOM RENDER */
const zoomCanvas = document.getElementById('zoom-canvas');
const zoomCtx = zoomCanvas.getContext('2d');
function updateZoom(sourceEl) {
    const dpr = window.devicePixelRatio || 1;
    zoomCanvas.width = 120 * dpr; zoomCanvas.height = 120 * dpr;
    zoomCtx.setTransform(1,0,0,1,0,0);
    zoomCtx.imageSmoothingEnabled = true;
    
    const ZOOM_SIZE = 24; // Area a cortar
    zoomCtx.drawImage(sourceEl, pickSX - ZOOM_SIZE/2, pickSY - ZOOM_SIZE/2, ZOOM_SIZE, ZOOM_SIZE, 0, 0, zoomCanvas.width, zoomCanvas.height);
    
    // Crosshair central
    const cx=zoomCanvas.width/2, cy=zoomCanvas.height/2;
    zoomCtx.strokeStyle="rgba(255,0,0,0.8)"; zoomCtx.lineWidth=2;
    zoomCtx.beginPath(); zoomCtx.moveTo(cx,0); zoomCtx.lineTo(cx,zoomCanvas.height);
    zoomCtx.moveTo(0,cy); zoomCtx.lineTo(zoomCanvas.width,cy); zoomCtx.stroke();
}
function positionLoupe() {
    const rect=viewportContainer.getBoundingClientRect();
    const loupe=document.getElementById('zoom-loupe');
    const rad=60; 
    let x = pickX * rect.width, y = pickY * rect.height - rad - 25;
    if(y < 10) y = pickY * rect.height + rad + 25;
    loupe.style.left = Math.max(rad, Math.min(rect.width-rad, x)) + 'px';
    loupe.style.top  = Math.max(rad, Math.min(rect.height-rad, y)) + 'px';
}

/* =========================
   EVENTOS BOTONES
   ========================= */
document.getElementById('freeze-btn').addEventListener('click', () => {
    if(camMode!=='camera') return;
    isFrozen=!isFrozen;
    const v = document.getElementById('video');
    const btn = document.getElementById('freeze-btn');
    if(isFrozen) { v.pause(); btn.innerText="Reanudar"; analyzeFrame(v); }
    else { v.play(); btn.innerText="Congelar"; camLoop(); }
});

document.getElementById('file-upload').addEventListener('change', (e) => {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
        imgElement.src = evt.target.result;
        imgElement.onload = () => {
            camMode='image'; isFrozen=true;
            video.style.display='none'; imgElement.style.display='block';
            document.getElementById('freeze-btn').style.display='none';
            setPickToCenter(imgElement); analyzeFrame(imgElement);
        };
    };
    reader.readAsDataURL(file);
});

document.getElementById('confirm-color-btn').addEventListener('click', () => {
    // Usamos el que el usuario haya seleccionado (o el mejor por defecto)
    const finalRal = selectedRalForUse; 
    const finalHex = ralToHexMap[finalRal].hex;
    updateAppWithColor(finalRal, finalHex);
    closeCameraApp();
});

async function camLoop() {
    if(camMode==='camera' && !isFrozen && document.getElementById('camera-app').style.display!=='none') {
        analyzeFrame(video); requestAnimationFrame(camLoop);
    }
}

/* =========================
   MODAL RAL (Buscar/Lista)
   ========================= */
function buildRalModalList() {
    const list = document.getElementById('ral-list');
    if(list.childElementCount > 0) return;
    const sorted = Object.keys(ralToHexMap).sort();
    sorted.forEach(ral => {
        const d = ralToHexMap[ral];
        const row = document.createElement('div');
        row.className = 'ral-item';
        row.innerHTML = `<div class="ral-swatch" style="background:${d.hex}"></div><div><strong>RAL ${ral}</strong><br><small>${d.name}</small></div>`;
        row.onclick = () => { updateAppWithColor(ral, d.hex); closeRalModal(); };
        row.dataset.search = (ral + " " + d.name).toLowerCase();
        list.appendChild(row);
    });
}
function openRalModal() {
    document.getElementById('ral-modal').classList.add('show');
    document.getElementById('ral-search').value='';
    filterRalList('');
}
function closeRalModal() { document.getElementById('ral-modal').classList.remove('show'); }
function filterRalList(q) {
    const term = q.trim().toLowerCase();
    const rows = document.getElementById('ral-list').children;
    for(let row of rows) row.style.display = row.dataset.search.includes(term) ? 'flex' : 'none';
}
document.getElementById('ral-close-btn').onclick = closeRalModal;
document.getElementById('ral-search').oninput = (e) => filterRalList(e.target.value);

document.addEventListener('DOMContentLoaded', () => {
    initCustomSelect();
    window.addEventListener('resize', () => {
         // Reajustar cruz si gira
         const src = (camMode==='camera')?video:imgElement;
         if(src && (src===video?src.videoWidth:src.naturalWidth)) drawCrosshair();
    });
});
